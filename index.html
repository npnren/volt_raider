/* -- FINAL: TESSERAX, 4D war machine. HARD form = true tesseract (16 verts of
   (±1,±1,±1,±1) rotated in XW/YZ/ZW planes, projected 4D→3D→2D), armored ×0.45 dmg.
   SOFT form = liquid-metal mass (molten chrome), takes ×1.3 dmg. Warps through
   wormholes; phase3 opens remote rifts that fire from elsewhere on screen. -- */
function mkTesserax(){
  const b=bossBase(bossHp(1200));b.name='TESSERAX';
  b.x=150;b.y=110;b.scale=0;
  b.form=0;b.morph=0;b.formT=6.5;      // 0=hard 1=soft; morph eases toward form
  b.holes=[];                          // remote rift portals
  b.atk={m:'emerge',t:0,i:0,ang:0};
  /* 4D hypercube: 16 vertices, 32 edges (pairs differing in exactly one axis) */
  const V4=[];for(let i=0;i<16;i++)V4.push([i&1?1:-1,i&2?1:-1,i&4?1:-1,i&8?1:-1]);
  const E4=[];for(let i=0;i<16;i++)for(let j=i+1;j<16;j++){const d=i^j;if(!(d&(d-1)))E4.push([i,j]);}
  b.proj=function(){
    const a=b.t*0.7,c1=Math.cos(a),s1=Math.sin(a),
      a2=b.t*0.45,c2=Math.cos(a2),s2=Math.sin(a2),
      a3=b.t*0.3,c3=Math.cos(a3),s3=Math.sin(a3),out=[];
    for(const v of V4){
      const x=v[0],y=v[1];let z=v[2],w=v[3];
      const x1=x*c1+w*s1;w=-x*s1+w*c1;               // rotate XW
      const y1=y*c2+z*s2;z=-y*s2+z*c2;               // rotate YZ
      const z2=z*c3+w*s3;w=-z*s3+w*c3;               // rotate ZW
      const k4=2.4/(2.4-w*0.9);                      // 4D→3D perspective
      const k3=2.6/(2.6-z2*k4*0.55);                 // 3D→2D perspective
      out.push({x:b.x+x1*k4*k3*19*b.scale,y:b.y+y1*k4*k3*19*b.scale,d:k4*k3});}
    return out;
  };
  const portal=(x,y,r,a)=>{
    ctx.globalCompositeOperation='lighter';
    glow(GLO.violet,x,y,r*2.6,0.5*a);
    for(let i=0;i<3;i++){
      ctx.strokeStyle=i===1?'rgba(120,240,255,'+0.6*a+')':'rgba(220,120,255,'+0.55*a+')';
      ctx.lineWidth=2-i*0.5;
      ctx.beginPath();ctx.arc(x,y,r*(0.55+i*0.28),b.t*(2.2+i)+i*2.1,b.t*(2.2+i)+i*2.1+4.6);ctx.stroke();}
    glow(GLO.white,x,y,r*0.8,0.7*a);
    ctx.globalCompositeOperation='source-over';};
  const coreHit=b.hit.bind(b);
  b.hit=function(dmg){coreHit(dmg*(b.morph<0.5?0.45:1.3));};
  b.update=function(dt){
    b.t+=dt;b.flash=Math.max(0,b.flash-6*dt);
    if(b.dying>0){b.holes.length=0;return;}
    const ph=phaseOf(b),spd=1+(ph-1)*0.3+rank*0.08,A=b.atk;
    if(A.m==='emerge'){b.scale=Math.min(1,b.scale+dt/2.2);
      if(b.scale>=1){A.m='idle';A.t=1;banner('硬質形態は装甲状態 — 軟体化の隙を撃て！',2.8);}return;}
    /* form transform */
    b.formT-=dt;
    if(b.formT<=0&&A.m!=='warp'){b.form=1-b.form;b.formT=Math.max(6.5-ph*0.9,3.6);
      AU.pow();addExpl(b.x,b.y,0.8);}
    b.morph+=(b.form-b.morph)*Math.min(dt*2.4,1);
    /* remote rifts (phase 3) */
    if(ph===3&&b.holes.length<2&&Math.random()<dt*0.55)
      b.holes.push({x:rnd(30,270),y:rnd(60,270),t:0,f:0});
    for(let i=b.holes.length-1;i>=0;i--){const h=b.holes[i];h.t+=dt;
      if(h.t>0.8&&!h.f){h.f=1;aimedSpread(h.x,h.y,3,0.4,(104+rank*15)*spd,'needle');}
      if(h.t>1.6)b.holes.splice(i,1);}
    /* drift (soft form sways wider) */
    if(A.m!=='warp'){
      const sway=b.morph<0.5?46:62;
      b.x+=((150+Math.sin(b.t*0.5)*sway)-b.x)*Math.min(dt*1.6,1);
      b.y+=((104+Math.sin(b.t*0.83)*(16+b.morph*10))-b.y)*Math.min(dt*1.6,1);}
    A.t-=dt;
    if(A.m==='idle'){if(A.t<=0){
      const hard=b.morph<0.5;
      let pool=hard?['vertex','lattice']:(ph>=2?['pulse','spore','spiral']:['pulse','spore']);
      if(ph>=2&&Math.random()<0.3)pool=['warp'];
      A.m=pool[(rnd(0,pool.length))|0];A.t=0;A.i=0;A.ang=rnd(0,TAU);}return;}
    if(A.m==='warp'){ /* dive into a wormhole, resurface elsewhere */
      if(A.i===0){b.scale=Math.max(0,b.scale-dt*2.4);
        if(b.scale<=0){b.x=rnd(60,240);b.y=rnd(70,170);A.i=1;AU.warn();}}
      else{b.scale=Math.min(1,b.scale+dt*2.4);
        if(b.scale>=1){ringShot(b.x,b.y,14+ph*4,(78+rank*12)*spd,rnd(0,TAU));
          A.m='idle';A.t=1.2/spd;}}}
    else if(A.m==='vertex'&&A.t<=0){ /* needles from the 4 nearest hypercube vertices */
      const Pp=b.proj().sort((u,v)=>v.d-u.d);
      for(let k=0;k<4;k++){const p=Pp[k];
        eShot(p.x,p.y,aimAng(p.x,p.y),(112+rank*18)*spd,'needle');}
      A.i++;A.t=0.42;if(A.i>=3+ph){A.m='idle';A.t=1.4/spd;}}
    else if(A.m==='lattice'&&A.t<=0){ /* rotating geometric spokes */
      for(let k=0;k<8;k++)eShot(b.x,b.y,A.ang+k*TAU/8,(74+rank*10)*spd);
      A.ang+=0.19;A.i++;A.t=0.27;if(A.i>=5+ph){A.m='idle';A.t=1.5/spd;}}
    else if(A.m==='pulse'&&A.t<=0){ /* organic wide spray */
      aimedSpread(b.x,b.y,7,1.15,(80+rank*12)*spd);
      A.i++;A.t=0.55;if(A.i>=3){A.m='idle';A.t=1.4/spd;}}
    else if(A.m==='spore'&&A.t<=0){ /* slow dense bullet flowers */
      ringShot(b.x,b.y,26,(56+rank*8)*spd,A.ang+A.i*0.12);
      A.i++;A.t=0.6;if(A.i>=3){A.m='idle';A.t=1.5/spd;}}
    else if(A.m==='spiral'&&A.t<=0){ /* twin-arm slow spiral */
      eShot(b.x,b.y,A.ang,70*spd);eShot(b.x,b.y,A.ang+Math.PI,70*spd);
      A.ang+=0.33;A.i++;A.t=0.05;if(A.i>=36){A.m='idle';A.t=1.4/spd;}}
  };
  b.circles=()=>b.scale<0.6?[]:[{x:b.x,y:b.y,r:(b.morph<0.5?24:30)*b.scale,part:-1}];
  b.draw=function(){
    for(const h of b.holes)
      portal(h.x,h.y,12+Math.sin(h.t*9)*2,h.t<0.8?h.t/0.8:Math.max(0,1-(h.t-0.8)/0.8));
    if(b.scale<1)portal(b.x,b.y,18+34*(1-b.scale),1);
    if(b.scale<=0.02)return;
    const m=b.morph;
    if(m<0.999){ /* HARD: crystal tesseract wireframe */
      const Pp=b.proj(),wA=1-m;
      ctx.globalCompositeOperation='lighter';
      for(const e of E4){const p=Pp[e[0]],q=Pp[e[1]],dd=(p.d+q.d)/2;
        ctx.strokeStyle='rgba(150,240,255,'+clamp((0.14+dd*0.26)*wA,0,0.9)+')';
        ctx.lineWidth=dd>1.1?2:1;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}
      for(const p of Pp)glow(GLO.cyan,p.x,p.y,4+p.d*3.4,0.55*wA);
      glow(GLO.white,b.x,b.y,20,0.5*wA);
      ctx.globalCompositeOperation='source-over';}
    if(m>0.001){ /* SOFT: liquid-metal mass — molten chrome, softer to damage */
      const R=27*b.scale,n=26;
      ctx.globalAlpha=m;
      ctx.beginPath();
      for(let i=0;i<=n;i++){const a=i/n*TAU;
        const r=R*(1+0.16*Math.sin(a*3+b.t*2.3)+0.1*Math.sin(a*5-b.t*3.1)+0.06*Math.sin(a*8+b.t*4.7));
        const x=b.x+Math.cos(a)*r,y=b.y+Math.sin(a)*r*1.06;
        i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
      ctx.closePath();
      const gr=ctx.createRadialGradient(b.x-R*0.3,b.y-R*0.35,2,b.x,b.y,R*1.25);
      gr.addColorStop(0,'#f6faff');gr.addColorStop(0.35,'#aebfd2');
      gr.addColorStop(0.7,'#4d5c70');gr.addColorStop(1,'#161c26');
      ctx.fillStyle=gr;ctx.fill();
      ctx.strokeStyle='rgba(225,240,255,0.75)';ctx.lineWidth=1.5;ctx.stroke();
      /* rolling specular band — light sliding over chrome */
      ctx.save();ctx.clip();
      const sx=b.x+Math.sin(b.t*1.5)*R*0.7;
      const sg=ctx.createLinearGradient(sx-8,0,sx+8,0);
      sg.addColorStop(0,'rgba(255,255,255,0)');sg.addColorStop(0.5,'rgba(255,255,255,0.5)');
      sg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=sg;ctx.fillRect(sx-8,b.y-R*1.2,16,R*2.4);
      ctx.restore();
      ctx.globalAlpha=1;
      ctx.globalCompositeOperation='lighter';
      const nx=b.x+Math.sin(b.t*1.7)*6,ny=b.y+Math.cos(b.t*1.3)*5;
      glow(GLO.cyan,nx,ny,18,0.6*m);glow(GLO.white,nx,ny,8,0.85*m);
      for(let i=0;i<5;i++){const a=b.t*0.9+i*TAU/5;  // mercury droplets orbiting the mass
        glow(GLO.white,b.x+Math.cos(a)*R*0.55,b.y+Math.sin(a)*R*0.5,5,0.5*m);}
      ctx.globalCompositeOperation='source-over';}
    if(b.flash>0){ctx.globalCompositeOperation='lighter';
      glow(GLO.white,b.x,b.y,56,b.flash*2.2);ctx.globalCompositeOperation='source-over';}
  };
  return b;
}
const BOSS_MK=[mkVulture,mkReaper,mkGeoGrinder,mkOctopus,mkOvermind,mkTesserax];
</script>
<script>
'use strict';
/* ---------- flow ---------- */
function startGame(){
  state='play';paused=false;dPaused.style.display='none';
  dTitle.style.display='none';dOver.style.display='none';dClear.style.display='none';
  score=0;stage=CHEAT.stage;stageT=CHEAT.boss?BOSS_AT-5:0;gTime=0;nextExtend=0;carrierDrop=0;clearT=0;scrollHold=false;
  if(stg().key==='wrp'&&!CHEAT.boss)stageT=BOSS_AT-6;   // final stage is pure boss
  Object.assign(P,{x:150,y:360,alive:true,inv:2,lives:3,bombs:3,power:0,weapon:'V',sub:null,subLv:0,fireCd:0,mslCd:0});
  if(CHEAT.bomb)P.bombs=7;
  if(CHEAT.w1){P.weapon='V';P.power=7;}
  if(CHEAT.w2){P.weapon='L';P.power=7;}
  enemies.length=0;pBul.length=0;eBul.length=0;items.length=0;missiles.length=0;parts.length=0;
  bomb=null;bossObj=null;dBossW.style.display='none';dBossN.style.display='none';
  warnDone=false;clearFrom=null;waveT=2.2;carrierT=14;eliteT=20;
  traps.length=0;trapT=6;trapWarn=false;
  BG=stg().bg();
  BGM.want='stage'+stgIdx();
  stageSplash();
  refreshStatus();refreshHUD();
}
function nextStage(){
  endingOn=false;scrollHold=false;
  stage++;stageT=0;warnDone=false;clearFrom=null;waveT=3;carrierT=14;eliteT=18;
  if(stg().key==='wrp')stageT=BOSS_AT-6;   // final stage is pure boss: warning in 2s, TESSERAX at 6s
  traps.length=0;trapT=6;trapWarn=false;
  for(const e of enemies)if(e.roofUnit)e.dead=true;   // rooftop units stay with their city buildings
  BG=stg().bg();
  BGM.want='stage'+stgIdx();
  const loop=Math.floor((stage-1)/6)+1;
  stageSplash();
  if(stgIdx()===5)say('Final stage',true);
  refreshStatus();
}
function bossDefeated(){
  traps.length=0;
  const bx=bossObj.x,by=bossObj.y;
  addExpl(bx,by,3.2,true);flashScreen(0.85,700);
  addScore(50000);popup(bx,by,'+50000');
  dropItem(bx-16,by,'P');dropItem(bx+16,by,'B');
  bossObj=null;dBossW.style.display='none';dBossN.style.display='none';
  say(stgIdx()===5?'Mission complete':'Stage clear',true);
  if(stgIdx()===5){clearT=ENDD;endingOn=true;AU.extend();BGM.want='title';}
  else nextStage();
}
function spawnBoss(){
  bossObj=BOSS_MK[stgIdx()]();
  BGM.want=stgIdx()===5?'boss2':'boss';say('Warning',true);
  dBossW.style.display='block';
}
function gameOver(){
  state='over';BGM.want=null;say('Game over',true);
  dFinal.textContent=String(score).padStart(8,'0')+(score>=hiScore&&score>0?' ★':'');
  dOver.style.display='flex';
  dBossW.style.display='none';dBossN.style.display='none';
}
function toTitle(){state='title';BGM.want='title';dOver.style.display='none';dTitle.style.display='flex';}

/* ---------- update ---------- */
function update(dt){
  gTime+=dt;if(!scrollHold)scrollY+=SCR*dt;
  if(state!=='play'||paused)return;
  if(clearT>0){clearT-=dt;
    if(clearT<=0){dClear.style.display='none';nextStage();}}
  else stageT+=dt;
  const loop=Math.floor((stage-1)/6)+1;
  rank=Math.min((loop-1)*1.0+stgIdx()*0.22+gTime*0.0035,3);

  /* player */
  if(P.alive){
    P.inv=Math.max(0,P.inv-dt);
    let mx=0,my=0;
    if(keys['arrowleft']||keys['a'])mx-=1;if(keys['arrowright']||keys['d'])mx+=1;
    if(keys['arrowup']||keys['w'])my-=1;if(keys['arrowdown']||keys['s'])my+=1;
    if(mx&&my){mx*=0.7071;my*=0.7071;}
    P.x=clamp(P.x+mx*148*dt,PF.xmin,PF.xmax);
    P.y=clamp(P.y+my*148*dt,PF.ymin,PF.ymax);
    P.tilt+=((mx*0.28)-P.tilt)*Math.min(dt*10,1);
    firePlayer(dt);
    if(Math.random()<0.85)parts.push({x:P.x+rnd(-2,2),y:P.y+13,vx:0,vy:70,life:0.22,t:0,
      s:rnd(4,7),g:-12,ty:'glow',img:GLO.cyan,a:0.5});
  }else{P.respT-=dt;if(P.respT<=0){if(P.lives<0)gameOver();else respawn();}}

  /* bomb */
  if(bomb){
    bomb.t+=dt;
    const R=bomb.t*115+22;
    for(let i=eBul.length-1;i>=0;i--){const bl=eBul[i];
      if(Math.hypot(bl.x-P.x,bl.y-P.y)<R){spark(bl.x,bl.y);eBul.splice(i,1);}}
    for(const e of enemies)if(!e.dead&&Math.hypot(e.x-P.x,e.y-P.y)<R){
      e.hp-=70*dt;e.flash=0.4;if(e.hp<=0)killEnemy(e);}
    if(bossObj&&!bossObj.dying)for(const c of bossObj.circles())
      if(Math.hypot(c.x-P.x,c.y-P.y)<R+c.r)bossObj.hit(48*dt,c.part);
    if(Math.random()<0.6)parts.push({x:P.x+rnd(-R,R)*0.7,y:P.y+rnd(-R,R)*0.7,vx:0,vy:0,
      life:0.3,t:0,s:rnd(14,30),g:60,ty:'ring',img:RING.white,a:0.5});
    if(bomb.t>1.5)bomb=null;
  }

  /* spawner */
  if(!bossObj&&clearT<=0){
    waveT-=dt;
    if(waveT<=0&&stageT<BOSS_AT-4){spawnWave();
      waveT=Math.max((stg().key==='city'?2.0:2.6)-rank*0.5,1.0);}
    carrierT-=dt;
    if(carrierT<=0&&stageT<BOSS_AT-6){spawnCarrier();carrierT=20;}
    eliteT-=dt;
    if(eliteT<=0&&stageT<BOSS_AT-10){
      if(stg().key!=='city'&&stg().key!=='jgl')spawnElite();eliteT=19;}   // custom rosters: no generic elites
    /* city rooftop units: spawn when their building scrolls in at the top,
       or sometimes DEPLOY mid-screen on a visible roof (fade-in + dust) */
    if(stg().key==='city'){
      const off=((scrollY*0.22)%768+768)%768;
      const spawnGun=(g,y,fade)=>mkE('twr',g.tx,y,{hp:20,pat:'twr',tx:g.tx,ty:g.ty,st:0,
        aim:Math.PI/2,roofUnit:1,fc:1,fade});
      const spawnHeli=(p,y,fade)=>mkE('heli',p.tx,y,{hp:35,pat:'heli',tx:p.tx,ty:p.ty,st:0,rpm:0,alt:0,
        hov:0,roofUnit:1,fc:1,fade});
      if(BG.guns)for(const g of BG.guns){
        const y=(g.ty+off)%768;g.cool=(g.cool||0)-dt;
        if(g.py!==undefined&&g.py-y>600&&g.cool<=0){spawnGun(g,y,1);g.cool=30;}
        else if(g.cool<=0&&y>50&&y<280&&Math.random()<dt*0.09&&Math.hypot(g.tx-P.x,y-P.y)>70){
          spawnGun(g,y,0);dust(g.tx,y,'#c9cdd6');g.cool=30;}
        g.py=y;
      }
      if(BG.pads)for(const p of BG.pads){
        const y=(p.ty+off)%768;p.cool=(p.cool||0)-dt;
        if(p.py!==undefined&&p.py-y>600&&p.cool<=0){spawnHeli(p,y,1);p.cool=32;}
        else if(p.cool<=0&&y>50&&y<280&&Math.random()<dt*0.06&&Math.hypot(p.tx-P.x,y-P.y)>70){
          spawnHeli(p,y,0);dust(p.tx,y,'#c9cdd6');p.cool=32;}
        p.py=y;
      }
    }
    /* MEGADOZER approaches: the jungle ahead of it is already flattened — the
       bulldozed clearing scrolls in from the top until the screen is bare ground */
    if(stg().key==='jgl'&&clearFrom===null&&stageT>=BOSS_AT-14)clearFrom=scrollY;
    /* desert sandstorms: warned, then dust devils sweep the dunes */
    if(stg().key==='des'&&BG.windT!==undefined){
      BG.windT-=dt;
      if(BG.windT<=0){BG.windT=rnd(9,13);
        banner('大砂嵐！！',1.6);AU.warn();shake=Math.max(shake,4);
        const dir=Math.random()<0.5?1:-1,n=3;
        for(let k=0;k<n;k++)mkE('torn',dir<0?W+26:-26,70+k*62,
          {pat:'torn',dir,baseY:70+k*62,t:0,wspd:64-k*13});}}
    /* terrain DOORS: mesa gun towers / jungle heli bays / desert sand towers */
    if((stg().key==='jgl'||stg().key==='des')&&clearFrom===null&&BG.doors){
      const th=BG.gth,off=((scrollY*BG.gspd)%th+th)%th;
      for(const d of BG.doors){
        const y=(d.ty+off)%th;d.cool=(d.cool||0)-dt;
        const spawn=()=>{d.kind==='gun'
          ?mkE('twr',d.tx,y,{hp:24,pat:'twr',tx:d.tx,ty:d.ty,st:0,aim:Math.PI/2,
              roofUnit:1,door:1,fc:1,fade:1})
          :mkE('heli',d.tx,y,{hp:38,pat:'heli',tx:d.tx,ty:d.ty,st:0,rpm:0,alt:0,hov:0,open:0,
              roofUnit:1,door:1,fc:1,fade:1});};
        if(d.py!==undefined&&d.py-y>600&&d.cool<=0){spawn();d.cool=30;}
        else if(d.cool<=0&&y>50&&y<280&&Math.random()<dt*0.05&&Math.hypot(d.tx-P.x,y-P.y)>70){
          spawn();dust(d.tx,y,stg().key==='des'?'#e0b070':'#9aa4a8');d.cool=30;}
        d.py=y;
      }
    }
    if(stageT>=BOSS_AT-4&&!warnDone){warnDone=true;dWarn.style.display='block';AU.warn();
      setTimeout(()=>dWarn.style.display='none',2600);}
    if(stageT>=BOSS_AT)spawnBoss();
  }else if(bossObj){
    bossObj.update(dt);
    if(bossObj.dying>0){
      bossObj.dying-=dt;
      if(Math.random()<0.4)addExpl(bossObj.x+rnd(-28,28),bossObj.y+rnd(-20,20),rnd(0.7,1.4));
      if(bossObj.dying<=0)bossDefeated();
    }else if(P.alive&&P.inv<=0){
      for(const c of bossObj.circles())
        if(Math.hypot(c.x-P.x,c.y-P.y)<c.r+4){playerHit();break;}
    }
  }

  /* -- STAGE 5: time & space traps drift down from the mothership fleet -- */
  if(stg().key==='spc'&&clearT<=0&&!(bossObj&&bossObj.dying>0)){
    trapT-=dt;
    if(trapT<=0&&traps.length<3){
      traps.push({x:rnd(40,260),y:-22,ty:Math.random()<0.5?'time':'space',
        t:0,wob:rnd(0,TAU),vy:rnd(34,50)});
      trapT=rnd(3.6,6.2);
      if(!trapWarn){trapWarn=true;
        banner('警告：四角い黒孔！ 触れるな — 金＝時間の罠 ／ 青＝空間の罠',3.2);AU.warn();}}}
  for(let i=traps.length-1;i>=0;i--){const tr=traps[i];
    tr.t+=dt;tr.y+=tr.vy*dt;tr.x+=Math.sin(tr.t*1.3+tr.wob)*22*dt;
    if(tr.y>H+26){traps.splice(i,1);continue;}
    if(P.alive&&P.inv<=0&&clearT<=0&&Math.hypot(tr.x-P.x,tr.y-P.y)<15){
      if(tr.ty==='time'){ /* the gold hole rewinds you: back to the start of the stage */
        for(let k=0;k<8;k++)parts.push({x:tr.x,y:tr.y,vx:Math.cos(k*TAU/8)*90,vy:Math.sin(k*TAU/8)*90,
          life:0.45,t:0,s:rnd(10,16),g:0,ty:'glow',img:GLO.gold,a:0.7});
        flashScreen(0.55,500);AU.warn();AU.clank();shake=10;
        banner('時間の罠！ ステージ最初に引き戻された…！',2.6);say('Time trap');
        stageT=0;warnDone=false;waveT=2.2;carrierT=14;eliteT=20;
        enemies.length=0;eBul.length=0;items.length=0;missiles.length=0;
        if(bossObj){bossObj=null;dBossW.style.display='none';dBossN.style.display='none';
          BGM.want='stage'+stgIdx();}
        traps.length=0;trapT=6;
        P.x=150;P.y=360;P.inv=2;
        break;}
      else{ /* the cyan hole swallows you whole: somewhere else entirely */
        for(let k=0;k<8;k++)parts.push({x:tr.x,y:tr.y,vx:Math.cos(k*TAU/8)*90,vy:Math.sin(k*TAU/8)*90,
          life:0.45,t:0,s:rnd(10,16),g:0,ty:'glow',img:GLO.cyan,a:0.7});
        for(let k=0;k<10;k++)parts.push({x:P.x+rnd(-6,6),y:P.y+rnd(-6,6),
          vx:rnd(-70,70),vy:rnd(-70,70),life:0.3,t:0,s:rnd(1.5,3),g:0,ty:'px',col:'#9be6ff'});
        P.x=rnd(30,270);P.y=rnd(60,330);P.inv=0.5;
        banner('空間の罠！',1.4);AU.warn();flashScreen(0.3,260);shake=6;
        for(let k=0;k<10;k++)parts.push({x:P.x+rnd(-6,6),y:P.y+rnd(-6,6),
          vx:rnd(-70,70),vy:rnd(-70,70),life:0.3,t:0,s:rnd(1.5,3),g:0,ty:'px',col:'#9be6ff'});
        traps.splice(i,1);}}}

  /* enemies */
  for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];
    if(!e.dead)updEnemy(e,dt);
    if(e.dead){enemies.splice(i,1);continue;}
    if(P.alive&&P.inv<=0&&!e.ground&&!e.intro&&Math.hypot(e.x-P.x,e.y-P.y)<e.r+5){
      e.hp-=8;e.flash=0.3;if(e.hp<=0)killEnemy(e);playerHit();}
  }

  /* player bullets */
  const rkts=[];for(const rb of eBul)if(rb.hp>0)rkts.push(rb);  /* destructible rockets */
  for(let i=pBul.length-1;i>=0;i--){const b=pBul[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.y<-24||b.x<-20||b.x>W+20){pBul.splice(i,1);continue;}
    let dead=false;
    for(const rb of rkts){ /* shoot the rockets out of the sky */
      if(rb.hp<=0)continue;
      if(b.type==='L'&&b.hits.has(rb))continue;
      if(Math.hypot(rb.x-b.x,rb.y-b.y)<rb.r+b.r+1.5){
        rb.hp-=b.dmg;spark(b.x,b.y);AU.hit();
        if(rb.hp<=0){rb.dead=true;addExpl(rb.x,rb.y,rb.k==='hrkt'?1.1:0.7);addScore(100);AU.exs();}
        if(b.type==='L')b.hits.add(rb);else{dead=true;break;}
      }}
    if(!dead)for(const e of enemies){
      if(e.dead||e.intro)continue;
      if(b.type==='L'&&b.hits.has(e))continue;
      if(Math.hypot(e.x-b.x,e.y-b.y)<e.r+b.r){
        e.hp-=b.dmg;e.flash=0.25;spark(b.x,b.y);AU.hit();
        if(e.hp<=0)killEnemy(e);
        if(b.type==='L')b.hits.add(e);else{dead=true;break;}
      }}
    if(!dead&&bossObj&&!bossObj.dying){
      for(const c of bossObj.circles()){
        const key='b'+c.part;
        if(b.type==='L'&&b.hits.has(key))continue;
        if(Math.hypot(c.x-b.x,c.y-b.y)<c.r+b.r){
          bossObj.hit(b.dmg,c.part);fireSpark(b.x,b.y);
          if(b.type==='L')b.hits.add(key);else dead=true;
          break;
        }}}
    if(dead)pBul.splice(i,1);
  }

  /* missiles */
  for(let i=missiles.length-1;i>=0;i--){const m=missiles[i];
    m.t+=dt;
    if(m.homing){
      if(!m.tgt||m.tgt.hp<=0||m.tgt.dead){
        let best=null,bd=1e9;
        for(const e of enemies)if(!e.dead&&!e.intro){const d=Math.hypot(e.x-m.x,e.y-m.y);if(d<bd){bd=d;best=e;}}
        if(bossObj&&!bossObj.dying){const d=Math.hypot(bossObj.x-m.x,bossObj.y-m.y);if(d<bd)best=bossObj;}
        m.tgt=best;
      }
      const sp=230;
      if(m.tgt){
        const ta=Math.atan2(m.tgt.y-m.y,m.tgt.x-m.x),ca=Math.atan2(m.vy,m.vx);
        let d=ta-ca;while(d>Math.PI)d-=TAU;while(d<-Math.PI)d+=TAU;
        const na=ca+clamp(d,-5.4*dt,5.4*dt);
        m.vx=Math.cos(na)*sp;m.vy=Math.sin(na)*sp;
      }else{m.vy=-sp;m.vx*=0.9;}
    }else m.vy=Math.max(m.vy-480*dt,-400);
    m.x+=m.vx*dt;m.y+=m.vy*dt;
    if(Math.random()<0.7)parts.push({x:m.x,y:m.y+4,vx:0,vy:30,life:0.2,t:0,s:4,g:-6,ty:'glow',img:GLO.orange,a:0.5});
    if(m.y<-24||m.x<-20||m.x>W+20||m.t>4){missiles.splice(i,1);continue;}
    let boomed=false;
    for(const e of enemies)if(!e.dead&&!e.intro&&Math.hypot(e.x-m.x,e.y-m.y)<e.r+5){boomed=true;break;}
    if(!boomed&&bossObj&&!bossObj.dying)
      for(const c of bossObj.circles())if(Math.hypot(c.x-m.x,c.y-m.y)<c.r+5){boomed=true;break;}
    if(boomed){
      addExpl(m.x,m.y,0.8);
      for(const e of enemies)if(!e.dead&&Math.hypot(e.x-m.x,e.y-m.y)<24){
        e.hp-=m.dmg;e.flash=0.3;if(e.hp<=0)killEnemy(e);}
      if(bossObj&&!bossObj.dying)
        for(const c of bossObj.circles())if(Math.hypot(c.x-m.x,c.y-m.y)<c.r+26){bossObj.hit(m.dmg,c.part);break;}
      missiles.splice(i,1);
    }
  }

  /* enemy bullets */
  for(let i=eBul.length-1;i>=0;i--){const b=eBul[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.k==='ebolt'&&Math.random()<0.5)                  // ball lightning wobbles in flight
      {b.x+=rnd(-1.2,1.2);b.y+=rnd(-0.8,0.8);}
    if(b.k==='log')b.rot+=dt*7;                           // hurled trunks tumble end over end
    if(b.k==='rock')b.rot+=dt*9;
    if(b.k==='mine'){                                     // dozer mine: rides the ground, proximity blast
      b.mt=(b.mt||0)+dt;
      if(b.mt>5||(P.alive&&Math.hypot(b.x-P.x,b.y-P.y)<24)){
        eBul.splice(i,1);addExpl(b.x,b.y,0.9);
        ringShot(b.x,b.y,8,64+rank*8,rnd(0,TAU));continue;}
    }
    if(b.k==='fire'){                                     // boss flame: scorch the forest below
      if(BG.gctx&&Math.random()<dt*7){
        const th=BG.gth,ty=(((b.y-gOff())%th)+th)%th,g2=BG.gctx;
        g2.fillStyle='rgba(14,9,6,0.30)';
        g2.beginPath();g2.arc(b.x,ty,rnd(5,10),0,TAU);g2.fill();
        g2.fillStyle='rgba(30,16,8,0.5)';
        g2.beginPath();g2.arc(b.x+rnd(-4,4),ty+rnd(-4,4),rnd(2,4),0,TAU);g2.fill();
        if(Math.random()<0.4)parts.push({x:b.x,y:b.y,vx:rnd(-8,8),vy:rnd(-20,-6),life:0.5,t:0,
          s:rnd(5,9),g:20,ty:'glow',img:GLO.orange,a:0.5});
      }
    }
    if(b.dead){eBul.splice(i,1);continue;}                // rocket shot down this frame
    if(b.hp>0&&P.alive){                                  // rockets CHASE the hero (till the fuel runs dry)
      if(b.hT===undefined)b.hT=b.k==='hrkt'?1.6:2.4;
      b.hT-=dt;
      if(b.hT>0&&Math.hypot(P.x-b.x,P.y-b.y)>26){
        const sp2=Math.hypot(b.vx,b.vy),ca=Math.atan2(b.vy,b.vx),ta=Math.atan2(P.y-b.y,P.x-b.x);
        let d2=ta-ca;while(d2>Math.PI)d2-=TAU;while(d2<-Math.PI)d2+=TAU;
        const trn=(b.k==='rkt'?2.6:b.k==='brkt'?2.0:1.4)*dt;
        const na=ca+clamp(d2,-trn,trn);
        b.vx=Math.cos(na)*sp2;b.vy=Math.sin(na)*sp2;b.rot=na;}}
    if(b.k==='rkt'||b.k==='brkt'){                        // rockets light off: slow launch → burn hard
      const sp=Math.hypot(b.vx,b.vy),cap=b.k==='rkt'?185:125;
      if(sp<cap){const g=1+dt*0.85;b.vx*=g;b.vy*=g;}
    }
    if(b.k==='hrkt'){                                     // heavy rocket: burns hard to extreme speed
      const sp=Math.hypot(b.vx,b.vy);
      if(sp<420){const g=1+dt*2.4;b.vx*=g;b.vy*=g;}
      if(Math.random()<0.9)parts.push({x:b.x,y:b.y,vx:rnd(-8,8),vy:rnd(-8,8),life:0.35,t:0,
        s:rnd(9,14),g:30,ty:'glow',img:GLO.orange,a:0.4});
      if(Math.random()<0.5)parts.push({x:b.x-b.vx*0.02,y:b.y-b.vy*0.02,vx:rnd(-6,6),vy:rnd(-6,6),
        life:0.5,t:0,s:rnd(5,9),g:26,ty:'glow',img:GLO.white,a:0.22});
    }
    if((b.k==='rkt'||b.k==='brkt')&&Math.random()<0.45)   // rocket exhaust smoke
      parts.push({x:b.x,y:b.y,vx:rnd(-5,5),vy:rnd(-5,5),life:0.3,t:0,
        s:b.k==='brkt'?8:5,g:16,ty:'glow',img:GLO.orange,a:0.3});
    if(b.y<-24||b.y>H+24||b.x<-24||b.x>W+24){eBul.splice(i,1);continue;}
    if(P.alive&&P.inv<=0&&Math.hypot(b.x-P.x,b.y-P.y)<b.r+2.6){
      eBul.splice(i,1);playerHit();}
  }

  /* items */
  for(let i=items.length-1;i>=0;i--){const it=items[i];
    it.t+=dt;
    const d=Math.hypot(it.x-P.x,it.y-P.y);
    if(P.alive&&d<60){it.x+=(P.x-it.x)/d*95*dt;it.y+=(P.y-it.y)/d*95*dt;}
    else{it.x+=Math.sin(it.t*2)*it.vx*dt;it.y+=Math.cos(it.t*1.4)*7*dt;} // float in place
    it.x=clamp(it.x,10,W-10);it.y=clamp(it.y,26,H-42);                   // never leave screen
    if(P.alive&&d<14){
      items.splice(i,1);
      switch(it.type){
        case 'P':{
          const col=(Math.floor(it.t/1.1)%2===0)?'V':'L';
          if(P.weapon===col){if(P.power<7){P.power++;AU.pow();popup(it.x,it.y,'↑');}
            else{addScore(3000);popup(it.x,it.y,'+3000');AU.item();}}
          else{P.weapon=col;AU.pow();popup(it.x,it.y,'↑');}
          break;}
        case 'M':if(P.sub==='M')P.subLv=Math.min(P.subLv+1,3);else{P.sub='M';P.subLv=Math.max(P.subLv,1);}
          AU.item();popup(it.x,it.y,'↑');break;
        case 'H':if(P.sub==='H')P.subLv=Math.min(P.subLv+1,3);else{P.sub='H';P.subLv=Math.max(P.subLv,1);}
          AU.item();popup(it.x,it.y,'↑');break;
        case 'B':if(P.bombs<7){P.bombs++;popup(it.x,it.y,'+1');}else{addScore(3000);popup(it.x,it.y,'+3000');}
          AU.item();break;
        case 'MED':{const v=500+(stgIdx()+1)*250;addScore(v);popup(it.x,it.y,'+'+v);AU.item();break;}
      }
      refreshStatus();
    }
  }

  /* particles */
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.t+=dt;if(p.t>=p.life){parts.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.g)p.s+=p.g*dt;if(p.s<0.5)p.s=0.5;}

  refreshHUD();
  if(bossObj)dBossB.style.width=(clamp(bossObj.hp/bossObj.maxhp,0,1)*100)+'%';
  if(bannerTm>0){bannerTm-=dt;if(bannerTm<=0)dBanner.style.opacity=0;}
}

/* ---------- stage-1 rooftop units: hand-drawn (cover animation / rotor animation) ---------- */
function drawTower(e,oa){ /* fixed cannon tower — ONE design for every stage */
  const x=e.x,y=e.y;
  oa*=(e.fade===undefined?1:e.fade);   // mid-screen deploys fade in
  ctx.globalAlpha=oa;
  ctx.fillStyle='rgba(10,14,18,0.32)';ctx.beginPath();ctx.ellipse(x+3,y+4,10,7,0,0,TAU);ctx.fill();  // SE shadow
  const oct=(r,dy)=>{ctx.beginPath();for(let k=0;k<8;k++){const a=k/8*TAU+TAU/16;
    const px2=x+Math.cos(a)*r,py2=y+dy+Math.sin(a)*r*0.86;k?ctx.lineTo(px2,py2):ctx.moveTo(px2,py2);}ctx.closePath();ctx.fill();};
  ctx.fillStyle='#161c22';oct(11.4,0.8);                 // octagonal concrete plinth (side)
  ctx.fillStyle='#4c565e';oct(11,-0.6);
  ctx.fillStyle='#6a747c';oct(10,-1.8);                  // lit top face
  /* steel tower drum */
  ctx.fillStyle='#0c1216';ctx.beginPath();ctx.arc(x,y-3,8.2,0,TAU);ctx.fill();
  const dg=ctx.createRadialGradient(x-2.5,y-5.5,1,x,y-3,8);
  dg.addColorStop(0,'#aab6bc');dg.addColorStop(0.55,'#5a666e');dg.addColorStop(1,'#161e24');
  ctx.fillStyle=dg;ctx.beginPath();ctx.arc(x,y-3,7.2,0,TAU);ctx.fill();
  ctx.fillStyle='#0a1014';for(let k=0;k<8;k++){const a=k/8*TAU;                 // bolt ring
    ctx.beginPath();ctx.arc(x+Math.cos(a)*5.8,y-3+Math.sin(a)*5.8,0.7,0,TAU);ctx.fill();}
  /* rotating cannon */
  ctx.save();ctx.translate(x,y-3);ctx.rotate(e.aim);
  const rec=(e.rec||0)*2.6;
  ctx.fillStyle='#08111a';geoRR(3-rec,-2.6,13,5.2,1.6);ctx.fill();              // barrel casing
  const bg2=ctx.createLinearGradient(0,-2.6,0,2.6);
  bg2.addColorStop(0,'#9fb2ba');bg2.addColorStop(0.5,'#45565e');bg2.addColorStop(1,'#101a20');
  ctx.fillStyle=bg2;geoRR(3.6-rec,-1.9,11.6,3.8,1.2);ctx.fill();
  ctx.fillStyle='#0a141c';geoRR(12.6-rec,-2.4,3.4,4.8,1);ctx.fill();            // muzzle collar
  ctx.fillStyle='#2e3a44';geoRR(-4.5,-4.2,9,8.4,2.4);ctx.fill();                // turret block
  ctx.fillStyle='#5d6e78';geoRR(-3.6,-3.3,7.2,3,1.2);ctx.fill();
  ctx.restore();
  /* status beacon: dim until powered up */
  ctx.globalCompositeOperation='lighter';
  glow(GLO.red,x,y-3,e.st===1?5:2.6,(e.st===1?0.5+0.3*Math.sin(gTime*7+x):0.2)*oa);
  if(e.mf>0)glow(GLO.orange,x+Math.cos(e.aim)*15,y-3+Math.sin(e.aim)*15,13,Math.min(1,e.mf*6)*oa);
  if(e.flash>0)glow(GLO.white,x,y-2,18,e.flash*2*oa);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
}
function drawHeli(e,oa){
  const x=e.x,y=e.y,alt=e.alt||0,rpm=e.rpm||0,ra=e.rang||0;
  oa*=(e.fade===undefined?1:e.fade);   // mid-screen deploys fade in
  /* hillside hangar DOOR: stone slabs slide apart beneath the helicopter */
  if(e.door&&e.st<2){
    ctx.globalAlpha=oa;
    const op=(e.open||0),sl=op*10;
    ctx.fillStyle='#151a12';ctx.fillRect(x-11,y-10,22,20);                    // bay pit
    ctx.fillStyle='#3f4a3c';ctx.fillRect(x-12-sl,y-10,11,20);                 // west slab
    ctx.fillStyle='#5d6a52';ctx.fillRect(x-12-sl,y-10,10,19);
    ctx.fillStyle='#7c8a68';ctx.fillRect(x-12-sl,y-10,2,19);
    ctx.fillStyle='#3f4a3c';ctx.fillRect(x+1+sl,y-10,11,20);                  // east slab
    ctx.fillStyle='#4d584a';ctx.fillRect(x+2+sl,y-10,10,19);
    ctx.globalAlpha=1;
  }
  /* shadow slides SE and softens as it climbs */
  const ssc=1-alt*0.25;
  ctx.globalAlpha=oa*(0.45-alt*0.18);
  ctx.drawImage(SHADOW,x-11*ssc+2+alt*12,y-6*ssc+3+alt*15,22*ssc,12*ssc);
  ctx.globalAlpha=oa;
  const bob=e.st>=2?Math.sin(e.t*7)*0.8:0;
  ctx.save();ctx.translate(Math.round(x),Math.round(y+bob));
  /* airborne: nose swings toward the player + banks into the turn —
     attacking from the left and from the right read as two different poses */
  let lean=0;
  if(e.st>=2){
    const ta=Math.atan2(P.y-y,P.x-x)-Math.PI/2;
    lean=clamp(ta,-0.85,0.85);
    ctx.rotate(lean+Math.sin(e.t*1.1)*0.05);
  }
  /* tail boom (dark east side, lit west) + hazard stripes */
  ctx.fillStyle='#333947';ctx.fillRect(-1,-15,4,10);
  ctx.fillStyle='#4d5563';ctx.fillRect(-2,-15,3,10);
  ctx.fillStyle='#e0a83c';ctx.fillRect(-2,-13,3,1);ctx.fillRect(-2,-10,3,1);
  /* tail rotor */
  if(rpm>0.05){ctx.strokeStyle='rgba(220,230,245,'+(0.3+rpm*0.35)+')';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(3-Math.cos(ra*3)*4,-13-Math.sin(ra*3)*4);
    ctx.lineTo(3+Math.cos(ra*3)*4,-13+Math.sin(ra*3)*4);ctx.stroke();}
  else{ctx.fillStyle='#59616e';ctx.fillRect(2,-16,1,6);}
  /* stub wings — rocket pod on the RIGHT tip only (asymmetric character) */
  ctx.fillStyle='#333947';ctx.fillRect(-8,0,17,3);
  ctx.fillStyle='#4d5563';ctx.fillRect(-9,-1,17,3);
  ctx.fillStyle='#20252e';ctx.fillRect(7,-2,3,6);
  ctx.fillStyle='#454d5b';ctx.fillRect(6,-3,3,6);
  ctx.fillStyle='#181c23';ctx.fillRect(7,-2,1,1);ctx.fillRect(7,0,1,1);
  /* fuselage — dark east+south, lit west */
  ctx.fillStyle='#333947';ctx.fillRect(-3,-6,7,15);
  ctx.fillStyle='#4d5563';ctx.fillRect(-4,-7,7,15);
  ctx.fillStyle='#5f6877';ctx.fillRect(-4,-7,2,15);
  /* cockpit glass at the nose (south) */
  ctx.fillStyle='#7fd4ff';ctx.fillRect(-3,4,5,3);
  ctx.fillStyle='#cfeeff';ctx.fillRect(-3,4,2,1);
  /* chin cannon + muzzle flash while firing */
  ctx.fillStyle='#161a20';ctx.fillRect(-1.5,8,3,4);
  if(e.mf>0){ctx.globalCompositeOperation='lighter';
    glow(GLO.yellow,0,13,10,Math.min(1,e.mf*7));
    ctx.globalCompositeOperation='source-over';ctx.globalAlpha=oa;}
  /* skids */
  ctx.fillStyle='#20242c';ctx.fillRect(-6,-2,1,8);ctx.fillRect(5,-2,1,8);
  /* main rotor */
  ctx.fillStyle='#161a20';ctx.fillRect(-1,-2,3,3);
  if(rpm>0.03){
    ctx.strokeStyle='rgba(215,225,240,'+(0.55-rpm*0.25)+')';ctx.lineWidth=1.5;
    for(const o of[0,Math.PI/2]){ctx.beginPath();
      ctx.moveTo(-Math.cos(ra+o)*13,-1-Math.sin(ra+o)*13);
      ctx.lineTo(Math.cos(ra+o)*13,-1+Math.sin(ra+o)*13);ctx.stroke();}
    if(rpm>0.5){ctx.fillStyle='rgba(200,215,235,'+(0.10*rpm)+')';
      ctx.beginPath();ctx.arc(0,-1,13,0,TAU);ctx.fill();}
  }else{ctx.fillStyle='#454c59';ctx.fillRect(-11,-1.5,22,1.5);ctx.fillRect(-1,-11,1.5,20);}
  ctx.restore();
  if(e.flash>0){ctx.globalCompositeOperation='lighter';
    glow(GLO.white,x,y,20,e.flash*2*oa);ctx.globalCompositeOperation='source-over';}
  ctx.globalAlpha=1;
}
function drawTornado(e){ /* BIG dust devil: tall whirling column, wide crown */
  const t=gTime;
  ctx.fillStyle='rgba(90,44,18,0.28)';
  ctx.beginPath();ctx.ellipse(e.x+10,e.y+26,21,7,0,0,TAU);ctx.fill();
  for(let k=0;k<9;k++){const h2=k/8,yy=e.y+22-h2*72,rr=7+h2*23;
    const wob=Math.sin(t*9+k*1.3)*4.5*h2;
    ctx.fillStyle='rgba(216,166,106,'+(0.36-h2*0.18).toFixed(2)+')';
    ctx.beginPath();ctx.ellipse(e.x+wob,yy,rr,rr*0.42,0,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(255,224,170,'+(0.42-h2*0.22).toFixed(2)+')';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.ellipse(e.x+wob,yy,rr*0.9,rr*0.36,0,t*8+k,t*8+k+2.4);ctx.stroke();
    ctx.strokeStyle='rgba(150,88,40,'+(0.3-h2*0.15).toFixed(2)+')';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(e.x+wob,yy,rr*0.7,rr*0.3,0,-t*10+k*2,-t*10+k*2+1.8);ctx.stroke();}
  ctx.fillStyle='rgba(120,70,30,0.8)';
  for(let k=0;k<6;k++){const a=t*10+k*1.3,h2=(Math.sin(t*3+k)+1)/2;
    ctx.fillRect(e.x+Math.cos(a)*(9+h2*20)-2,e.y+20-h2*62-2,4,4);}
  if(e.flash>0){ctx.globalCompositeOperation='lighter';
    glow(GLO.white,e.x,e.y,34,e.flash*2);ctx.globalCompositeOperation='source-over';}
  if(Math.random()<0.4)dust(e.x+rnd(-11,11),e.y+24,'#d8a860');
}
/* ---------- render ---------- */
function render(dt){
  shake*=Math.pow(0.012,dt);
  const sx=(Math.random()-0.5)*shake*0.6,sy=(Math.random()-0.5)*shake*0.6;
  ctx.save();ctx.translate(Math.round(sx),Math.round(sy));
  ctx.drawImage(BG.sky,0,0);
  for(const L of BG.layers){
    const th=L.cv.height,off=((scrollY*L.spd)%th+th)%th;
    ctx.drawImage(L.cv,0,off-th);ctx.drawImage(L.cv,0,off);
    if(off+th<H)ctx.drawImage(L.cv,0,off+th);
  }
  if(BG.clear&&clearFrom!==null){ /* bulldozed clearing swallows the jungle from the top */
    const th=BG.gth,off=((scrollY*BG.gspd)%th+th)%th;
    const by=Math.min((scrollY-clearFrom)*BG.gspd,H+24);
    ctx.save();ctx.beginPath();ctx.rect(0,0,W,by);ctx.clip();
    ctx.drawImage(BG.clear,0,off-th);ctx.drawImage(BG.clear,0,off);
    if(off+th<H)ctx.drawImage(BG.clear,0,off+th);
    ctx.restore();
    if(by<H+18)for(let x=-4;x<W+6;x+=9){ /* felled-timber berm along the cut line */
      const j=Math.sin(x*12.9898)*43758.545,f=j-Math.floor(j);
      ctx.fillStyle='#2a1a0a';ctx.fillRect(x,by-4+f*4,10,7);
      ctx.fillStyle='#54381a';ctx.fillRect(x,by-5+f*4,10,4);
      ctx.fillStyle='#7c5628';ctx.fillRect(x,by-5+f*4,10,1.4);
      if(f>0.55){ctx.fillStyle='#3a2610';ctx.fillRect(x-2,by+1+f*4,13,4);
        ctx.fillStyle='#5f421d';ctx.fillRect(x-2,by+1+f*4,13,1.8);
        ctx.fillStyle='#c9a05e';ctx.fillRect(x+10.2,by+1+f*4,1.8,4);}}
  }
  BG.fx(dt,gTime);
  const shAlpha=BG.shadow;
  /* ground units */
  for(const e of enemies)if(e.ground&&!e.intro){
    let oa=1;
    if(stg().key==='city'&&!e.roofUnit){    // city vehicles drive UNDER the boulevard overpasses
      for(const yc of[0,256,512]){          // overpass rows in the 768px ground tile (spd 0.22)
        let dm=Math.abs(e.y-(((yc+scrollY*0.22)%768+768)%768));dm=Math.min(dm,768-dm);
        if(dm<15){oa=0;break;}if(dm<21)oa=Math.min(oa,(dm-15)/6);}
      if(oa<=0)continue;
    }
    if(e.role==='twr'){drawTower(e,oa);continue;}
    if(e.role==='heli'){drawHeli(e,oa);continue;}   // still parked on its pad
    if(shAlpha){ctx.globalAlpha=(shAlpha+0.1)*oa;ctx.drawImage(SHADOW,e.x-10,e.y-2,20,10);}
    ctx.globalAlpha=oa;
    blit(e.spr,e.x,e.y,e.rot);
    if(e.flash>0){ctx.globalAlpha=e.flash*2.4*oa;ctx.globalCompositeOperation='lighter';
      blit(e.spr,e.x,e.y,e.rot);ctx.globalCompositeOperation='source-over';}
    ctx.globalAlpha=1;
  }
  /* flyer shadows (helis cast their own altitude-scaled shadow) */
  if(shAlpha){ctx.globalAlpha=shAlpha;
    const waterSh=(sx,sy,seed)=>{ /* shadow rides the water: rippling slices */
      for(let i=0;i<5;i++){const wob=Math.sin(gTime*8+i*1.9+seed)*1.7;
        ctx.drawImage(SHADOW,0,i*2.4,24,2.4,sx+wob,sy+i*2,20,2);}};
    for(const e of enemies)if(!e.ground&&!e.intro&&e.role!=='heli'){
      if(BG.waterAt&&BG.waterAt(e.x+7,e.y+13))waterSh(e.x-10+7,e.y-5+13,e.x*0.7);
      else ctx.drawImage(SHADOW,e.x-10+7,e.y-5+13,20,10);}
    if(state==='play'&&P.alive){
      const sx=P.x-10+7,sy=P.y-5+13;
      if(BG.waterAt&&BG.waterAt(P.x+7,P.y+13)){
        /* over water the shadow rides the surface: rippling slices + fading rings */
        ctx.globalAlpha=Math.min(1,shAlpha+0.16);
        waterSh(sx,sy,0);
        { /* the hero MIRRORED in the water — flipped top-to-bottom, rippling, fading with depth */
          const spr=S.player,sw2=spr.width,sh2=spr.height,step=2,
            surf=stg().key==='sea'?0.44:0.34;          // the open sea mirrors brighter than a narrow river
          for(let sy2=0;sy2<sh2;sy2+=step){
            const near=(sy2+step)/sh2;                  // 1 at the surface (tail), →0 deeper down (nose)
            const wob=Math.sin(gTime*6-sy2*0.5)*(1+(1-near)*2.4);   // more distortion the deeper it goes
            ctx.globalAlpha=surf*near*near;
            ctx.drawImage(spr,0,sy2,sw2,step,
              P.x-sw2/2+wob,P.y+9+(sh2-sy2-step)*0.72,sw2,step*0.72);}
        }
        const ph=(gTime*1.4)%1;
        ctx.globalAlpha=0.3*(1-ph);
        ctx.strokeStyle='rgba(235,248,255,0.9)';ctx.lineWidth=1;
        ctx.beginPath();ctx.ellipse(sx+10,sy+5,5+ph*10,(5+ph*10)*0.42,0,0,TAU);ctx.stroke();
        ctx.globalAlpha=shAlpha;
      }else ctx.drawImage(SHADOW,sx,sy,20,10);
    }
    ctx.globalAlpha=1;}
  /* items */
  for(const it of items){

    const S2=13.5;                                                 /* half-size of the square rift */
    /* the void — pitch black centre bleeding into deep tinted edges */
    ctx.fillStyle='#000004';ctx.fillRect(-S2,-S2,S2*2,S2*2);

      const u=((tr.t*sp)+(k*0.0637)+(tr.wob*0.159))%1;             /* 0 -> 1 falling inward */
      const rad=(1-u)*S2*1.6;

      const sx=Math.cos(ang)*rad,sy=Math.sin(ang)*rad*0.9;

      const br=(0.25+0.75*u)*tw,sz=0.8+1.4*u;                      /* brighter+bigger near centre */

    for(let k=0;k<3;k++){

      ctx.fillStyle='#68727f';ctx.fillRect(-2*s,-5*s,2.4*s,9.5*s);      // lit west half

    const el=ENDD-clearT;

  ctx.restore();
}

      this.pulse(l,t,spb*1.75,this.d25,0.09,true);
      this.pulse(l,t+spb*2,spb*1.1,this.d125,0.035,false);}
    if(s.kick.indexOf(st16)>=0)this.kick(t);
    if(s.sn.indexOf(st16)>=0)this.snare(t);
    if(s.hat.indexOf(st16)>=0)this.hat(t);
  },
  pulse(n,t,dur,wave,vol,vib){
    const o=AU.ctx.createOscillator(),g=AU.ctx.createGain();
    o.setPeriodicWave(wave);
    const fq=440*Math.pow(2,(n-69)/12);o.frequency.value=fq;
    if(vib){const lo=AU.ctx.createOscillator(),lg=AU.ctx.createGain();
      lo.type='sine';lo.frequency.value=5.5;lg.gain.value=fq*0.007;
      lo.connect(lg);lg.connect(o.frequency);lo.start(t+0.08);lo.stop(t+dur+0.02);}
    g.gain.setValueAtTime(vol,t);
    g.gain.setValueAtTime(vol,t+Math.max(0.02,dur-0.03));
    g.gain.linearRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+dur+0.02);
  },
  tri(n,t,dur,vol){
    const o=AU.ctx.createOscillator(),g=AU.ctx.createGain();
    o.type='triangle';o.frequency.value=440*Math.pow(2,(n-69)/12);
    g.gain.setValueAtTime(vol,t);g.gain.setValueAtTime(vol,t+Math.max(0.02,dur-0.02));
    g.gain.linearRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+dur+0.02);
  },
  kick(t){
    const o=AU.ctx.createOscillator(),g=AU.ctx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(165,t);o.frequency.exponentialRampToValueAtTime(45,t+0.09);
    g.gain.setValueAtTime(0.55,t);g.gain.setValueAtTime(0.4,t+0.06);g.gain.linearRampToValueAtTime(0.001,t+0.11);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+0.12);
    const s=AU.ctx.createBufferSource();s.buffer=AU.noise;
    const f=AU.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=800;
    const g2=AU.ctx.createGain();g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    s.connect(f);f.connect(g2);g2.connect(this.gain);s.start(t);s.stop(t+0.05);
  },
  snare(t){
    const s=AU.ctx.createBufferSource();s.buffer=AU.noise;
    const f=AU.ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=2400;f.Q.value=0.6;
    const g=AU.ctx.createGain();
    g.gain.setValueAtTime(0.22,t);g.gain.setValueAtTime(0.13,t+0.03);
    g.gain.setValueAtTime(0.07,t+0.06);g.gain.linearRampToValueAtTime(0.001,t+0.1);
    s.connect(f);f.connect(g);g.connect(this.gain);s.start(t);s.stop(t+0.11);
  },
  hat(t){const s=AU.ctx.createBufferSource();s.buffer=AU.noise;
    const f=AU.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;
    const g=AU.ctx.createGain();g.gain.setValueAtTime(0.05,t);g.gain.setValueAtTime(0.025,t+0.015);
    g.gain.linearRampToValueAtTime(0.001,t+0.035);
    s.connect(f);f.connect(g);g.connect(this.gain);s.start(t);s.stop(t+0.04);}
};
