<script>
'use strict';
/* =====================================================
   VOLT RAIDER v2 — pure 2D pixel-art vertical shmup.
   A.D.2199: alien machine army. 5 themed stages, deep
   parallax backgrounds, flexible enemy motion, glow FX.
   ===================================================== */
const W=300,H=400,TAU=Math.PI*2;
const cv=document.getElementById('gl'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

/* ---------- pixel sprite builder ---------- */
function sprite(txt,pal,opt){
  opt=opt||{};
  let rows=txt.split('\n').filter(r=>r.trim().length);
  if(opt.m!==false)rows=rows.map(r=>r+r.slice(0,-1).split('').reverse().join(''));
  const h=rows.length,w=Math.max(...rows.map(r=>r.length)),s=opt.s||1;
  const c=document.createElement('canvas');c.width=w*s;c.height=h*s;
  const g=c.getContext('2d');
  rows.forEach((r,y)=>{for(let x=0;x<r.length;x++){const ch=r[x];
    if(ch==='.'||ch===' ')continue;g.fillStyle=pal[ch]||'#f0f';g.fillRect(x*s,y*s,s,s);}});
  return c;
}
function makeGlow(col,size){const c=document.createElement('canvas');c.width=c.height=size;
  const g=c.getContext('2d'),r=size/2,gr=g.createRadialGradient(r,r,0,r,r,r);
  gr.addColorStop(0,col);gr.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=gr;g.fillRect(0,0,size,size);return c;}
function makeRing(col,size){const c=document.createElement('canvas');c.width=c.height=size;
  const g=c.getContext('2d'),r=size/2,gr=g.createRadialGradient(r,r,0,r,r,r);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(0.62,'rgba(0,0,0,0)');gr.addColorStop(0.78,col);
  gr.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=gr;g.fillRect(0,0,size,size);return c;}
const GLO={
  white:makeGlow('rgba(255,255,255,0.95)',48),
  yellow:makeGlow('rgba(255,220,90,0.9)',48),
  orange:makeGlow('rgba(255,140,50,0.9)',48),
  red:makeGlow('rgba(255,60,60,0.9)',48),
  cyan:makeGlow('rgba(90,230,255,0.9)',48),
  blue:makeGlow('rgba(70,140,255,0.9)',48),
  magenta:makeGlow('rgba(255,70,180,0.9)',48),
  green:makeGlow('rgba(120,255,110,0.9)',48),
  violet:makeGlow('rgba(180,90,255,0.9)',48),
  gold:makeGlow('rgba(255,190,60,0.9)',48)
};
const RING={white:makeRing('rgba(255,255,255,0.85)',64),orange:makeRing('rgba(255,160,60,0.85)',64)};
function glow(img,x,y,s,a){ctx.globalAlpha=a;ctx.drawImage(img,x-s/2,y-s/2,s,s);ctx.globalAlpha=1;}
/* soft shadow blob */
const SHADOW=(()=>{const c=document.createElement('canvas');c.width=24;c.height=12;
  const g=c.getContext('2d'),gr=g.createRadialGradient(12,6,0,12,6,12);
  gr.addColorStop(0,'rgba(0,0,10,0.5)');gr.addColorStop(1,'rgba(0,0,10,0)');
  g.fillStyle=gr;g.save();g.scale(1,0.5);g.fillRect(0,0,24,24);g.restore();return c;})();

/* ---------- sprites ---------- */
/* player fighter */
const S={};
S.player=sprite(`
.......W
.......W
......SW
......CW
......CW
.....SCW
.....SSW
.B...SSW
.BB..SSW
.BBB.SSW
BBBBSSSW
BBBBSSSW
DBBBSSSW
DDDBSSSW
...DSSSW
....GGW.
....G.W.
`,{W:'#e9f2ff',S:'#8fa6c8',B:'#2b6bff',D:'#14346e',C:'#86f6ff',G:'#46536e'});
/* item-carrier (shared, gold band) */
S.carrier=sprite(`
.......R
.....RRR
....RRRR
...RRRRR
..RRGGGG
..RRRRRR
.RRRRRRR
.RRRRRRR
.DDRRRRR
..DDRRRR
....DDRR
......DD
`,{R:'#d84040',G:'#ffd24a',D:'#5e1518'});
/* kamikaze darter (city stage 1) — asymmetric grid: sunlit west edge, dark east side */
S.kam=sprite(`
...R...
..LRK..
..LRK..
.LRRRK.
.LRWRK.
LLRRRKK
.L.K.K.
`,{L:'#ffb2c8',R:'#ff3fa4',K:'#70102e',W:'#ffffff'},{m:false});
/* suicide machine-bird (stage 2) — swept steel wings, red sensor eye */
S.bird=sprite(`
...R...

function blit(img,x,y,rot,sc){
  sc=sc||1;
  if(!rot){ctx.drawImage(img,Math.round(x-img.width*sc/2),Math.round(y-img.height*sc/2),img.width*sc,img.height*sc);return;}
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.drawImage(img,-img.width*sc/2,-img.height*sc/2,img.width*sc,img.height*sc);ctx.restore();

<script>
'use strict';
/* ---------- parallax backgrounds (deep 2D) ---------- */
function tileCv(h){const c=document.createElement('canvas');c.width=W;c.height=h;const g=c.getContext('2d');g.imageSmoothingEnabled=false;return[c,g];}
function skyCv(fn){const c=document.createElement('canvas');c.width=W;c.height=H;const g=c.getContext('2d');fn(g);return c;}

function genCity(){
  /* ============ SUNNY DAY CITY ============
     - classic oblique 3D: every building shows its SOUTH wall and an EAST wall
       (east wall narrow on the left of the screen, wider on the right)
     - sun from the north-west → cast shadows fall to the south-east
     - every building sits INSIDE a city block — roads are never blocked
     - all layers scroll at ONE speed (nothing floats) */
  const sky=skyCv(g=>{g.fillStyle='#8f959e';g.fillRect(0,0,W,H);});
  const TH=768;

  /* ---- city plan ----
     x 20-40   : Avenue A (monorail overhead)   x 96-160 : MAIN BOULEVARD (3+3 lanes, median)
     median    : subway line, two open-cut windows
     x 212-262 : river                y 0,128,..: cross streets  */
  const AV=[{x0:20,x1:40}];
  const MAIN={x0:96,x1:160,med0:124,med1:132};
  const TR={x0:120,x1:136};
  const SUBW=[[160,224],[544,608]];
  const RIV={c:237,hw:22,amp:7};
  const rivX=y=>RIV.c+Math.sin(y*TAU/TH*2)*RIV.amp;
  const ST=16,SY=[];for(let y=0;y<=TH;y+=128)SY.push(y);
  /* alternating crossings: even ones fly OVER the boulevard, odd ones are signalized at grade */
  const OVP=SY.filter(yc=>((yc/128)|0)%2===0),SIGY=SY.filter(yc=>((yc/128)|0)%2===1);
  const monoX=ty=>30;   // monorail runs straight above Avenue A — never over a building

  /* ---- cast shadow (SE) for a building silhouette; tile-wrap safe ---- */
  function SH(g,x,y,w,d,ht){
    const l=ht*1.15,ly=l*0.72;
    g.fillStyle='rgba(25,35,60,0.28)';
    for(const oy of[0,-TH,TH]){
      g.beginPath();
      g.moveTo(x+2,y+oy+d+ht);g.lineTo(x+w,y+oy+d+ht);
      g.lineTo(x+w+l,y+oy+d+ht+ly);g.lineTo(x+2+l,y+oy+d+ht+ly);g.closePath();
      g.moveTo(x+w,y+oy+2);g.lineTo(x+w,y+oy+d+ht);
      g.lineTo(x+w+l,y+oy+d+ht+ly);g.lineTo(x+w+l,y+oy+2+ly);g.closePath();
      g.fill();
    }
  }
  /* ---- classic-3D building: roof + south wall + east wall ---- */
  function bld(g,x,y,w,d,ht,o){
    o=o||{};
    const we=Math.max(2,Math.round(ht*(0.35+0.30*(x+w/2)/W)));  // east wall: narrow left → wider right
    SH(g,x,y,w,d,ht);
    /* east wall (shade side) */
    g.fillStyle=o.side||'#8a8274';g.fillRect(x+w,y+2,we,d+ht-2);
    g.fillStyle='rgba(20,30,50,0.30)';g.fillRect(x+w,y+2,we,d+ht-2);
    if(ht>5&&we>2){g.fillStyle='rgba(40,60,90,0.55)';
      for(let yy=y+5;yy<y+d+ht-4;yy+=5)for(let xx=x+w+1;xx<x+w+we-1;xx+=3)
        if(Math.random()<0.5)g.fillRect(xx,yy,1,2);}
    /* south wall */
    g.fillStyle=o.wall||'#b3ab9c';g.fillRect(x,y+d,w,ht);
    g.fillStyle='rgba(255,255,255,0.25)';g.fillRect(x,y+d,w,1);
    if(ht>5){g.fillStyle=o.win||'#3a5674';
      for(let yy=y+d+3;yy<y+d+ht-2;yy+=4)for(let xx=x+2;xx<x+w-2;xx+=4)
        g.fillRect(xx,yy,2,2);}
    if(o.sign){g.fillStyle=o.sign;g.fillRect(x+1,y+d+ht-3,Math.min(w-2,10),2);} // shop awning
    /* roof */
    g.fillStyle=o.roof||'#c9cdd4';g.fillRect(x,y,w,d);
    g.fillStyle=o.edge||'#e6e9ee';g.fillRect(x,y,w,2);g.fillRect(x,y,2,d);
    g.fillStyle='rgba(30,40,60,0.22)';g.fillRect(x+w-2,y,2,d);g.fillRect(x,y+d-2,w,2);
  }
  function acUnits(g,x,y,w,d){g.fillStyle='#9aa0a9';
    for(let i=0,n=2+((w*d/300)|0);i<n;i++){const ax=x+3+rnd(0,w-9),ay=y+3+rnd(0,d-8);
      g.fillStyle='rgba(25,35,60,0.25)';g.fillRect(ax+1,ay+1,4,3);
      g.fillStyle='#9aa0a9';g.fillRect(ax,ay,4,3);}}
  function waterTank(g,x,y){g.fillStyle='rgba(25,35,60,0.25)';g.beginPath();g.arc(x+1,y+1,4,0,TAU);g.fill();
    g.fillStyle='#aeb4bd';g.beginPath();g.arc(x,y,4,0,TAU);g.fill();
    g.fillStyle='#d6dade';g.beginPath();g.arc(x-1,y-1,2,0,TAU);g.fill();}
  function helipad(g,cx,cy,r){g.fillStyle='#7c828c';g.beginPath();g.arc(cx,cy,r+3,0,TAU);g.fill();
    g.strokeStyle='#eef1f5';g.lineWidth=2;g.beginPath();g.arc(cx,cy,r,0,TAU);g.stroke();
    g.fillStyle='#eef1f5';g.fillRect(cx-4,cy-4,2,8);g.fillRect(cx+2,cy-4,2,8);g.fillRect(cx-3,cy-1,6,2);}
  function tree(g,tx,ty,r){
    g.fillStyle='rgba(25,35,60,0.30)';g.beginPath();g.ellipse(tx+r*0.7,ty+r*0.6,r,r*0.6,0,0,TAU);g.fill();
    g.fillStyle='#2f6a24';g.beginPath();g.arc(tx+1,ty+1,r,0,TAU);g.fill();
    g.fillStyle='#48924f';g.beginPath();g.arc(tx,ty,r,0,TAU);g.fill();
    g.fillStyle='#63b055';g.beginPath();g.arc(tx-r*0.3,ty-r*0.3,r*0.5,0,TAU);g.fill();}

  /* ================= GROUND LAYER ================= */
  const[f,fg]=tileCv(TH);
  fg.fillStyle='#9aa0a9';fg.fillRect(0,0,W,TH);
  fg.fillStyle='rgba(0,0,20,0.03)';
  for(let i=0;i<400;i++)fg.fillRect(rnd(0,W)|0,rnd(0,TH)|0,1,1);

  const BX=[[0,20],[40,96],[160,212],[262,300]];
  const parkBlk={bx:1,sy:512},plazaBlk={bx:2,sy:128};
  const cells=[];                                   // remember free cells for mid/near towers
  const ROOFS=[];                                   // building roof faces — hosts for turrets / helipads
  for(let si=0;si<SY.length-1;si++){
    const by0=SY[si]+ST/2,by1=SY[si+1]-ST/2;
    for(let bi=0;bi<BX.length;bi++){
      const[x0,x1]=BX[bi];
      if(x1-x0<24)continue;
      const isPark=(bi===parkBlk.bx&&SY[si]===parkBlk.sy);
      const isPlaza=(bi===plazaBlk.bx&&SY[si]===plazaBlk.sy);
      /* sidewalk apron */
      fg.fillStyle='#b6bac1';fg.fillRect(x0,by0,x1-x0,by1-by0);
      fg.strokeStyle='rgba(90,100,115,0.30)';fg.lineWidth=1;
      fg.strokeRect(x0+1.5,by0+1.5,x1-x0-3,by1-by0-3);
      if(isPark){ /* ---- sunny city park ---- */
        fg.fillStyle='#5d9e46';fg.fillRect(x0+4,by0+4,x1-x0-8,by1-by0-8);
        fg.fillStyle='rgba(255,255,220,0.18)';
        for(let i=0;i<90;i++)fg.fillRect(x0+5+rnd(0,x1-x0-11)|0,by0+5+rnd(0,by1-by0-11)|0,1,1);
        fg.strokeStyle='#cbb58e';fg.lineWidth=3;fg.beginPath();
        fg.moveTo(x0+8,by0+8);
        fg.bezierCurveTo(x0+50,by0+34,x1-46,by1-70,x1-10,by1-8);fg.stroke();
        fg.fillStyle='#3d85c0';fg.beginPath();
        fg.ellipse(x0+26,by1-30,15,10,0.3,0,TAU);fg.fill();
        fg.fillStyle='rgba(255,255,255,0.55)';fg.fillRect(x0+21,by1-33,7,2);
        for(let i=0;i<12;i++)tree(fg,x0+10+rnd(0,x1-x0-20),by0+10+rnd(0,by1-by0-26),rnd(4,8));
      }else if(isPlaza){ /* ---- plaza + fountain ---- */
        fg.fillStyle='#c3c7cd';fg.fillRect(x0+4,by0+4,x1-x0-8,by1-by0-8);
        fg.strokeStyle='rgba(90,100,115,0.25)';
        for(let yy=by0+12;yy<by1-6;yy+=10){fg.beginPath();fg.moveTo(x0+6,yy);fg.lineTo(x1-6,yy);fg.stroke();}
        const cx=(x0+x1)/2,cy=(by0+by1)/2;
        fg.fillStyle='rgba(25,35,60,0.25)';fg.beginPath();fg.arc(cx+2,cy+2,16,0,TAU);fg.fill();
        fg.fillStyle='#aeb3ba';fg.beginPath();fg.arc(cx,cy,16,0,TAU);fg.fill();
        fg.fillStyle='#3d85c0';fg.beginPath();fg.arc(cx,cy,12,0,TAU);fg.fill();
        fg.fillStyle='rgba(255,255,255,0.75)';fg.beginPath();fg.arc(cx,cy,5,0,TAU);fg.fill();
        fg.fillStyle='#ffffff';fg.fillRect(cx-1,cy-1,2,2);
        fg.fillStyle='#8a6a48';
        [[cx-24,cy-4],[cx+20,cy-4]].forEach(p=>fg.fillRect(p[0],p[1],5,9));
        tree(fg,x0+12,by0+12,5);tree(fg,x1-14,by1-14,5);
      }else{ /* ---- ordinary block: 2-3 low-rises, strictly inside the block ---- */
        cells.push({x0,x1,y0:by0,y1:by1});
        const n=2+(rnd(0,1.9)|0);
        const slot=(by1-by0-10)/n;
        for(let k=0;k<n;k++){
          const ht=rnd(4,7)|0;
          const maxw=x1-x0-14-ht;                       // room for east wall + shadow
          const bw=rnd(20,Math.max(21,Math.min(46,maxw)));
          const bh=Math.max(12,slot-8-ht);
          const bx=x0+5+rnd(0,Math.max(1,maxw-bw));
          const by=by0+5+k*slot+rnd(0,2);
          bld(fg,bx,by,bw,bh,ht,{sign:Math.random()<0.3?(Math.random()<0.5?'#d0483a':'#2f7fd0'):null});
          if(Math.random()<0.6)acUnits(fg,bx,by,bw,bh);
          ROOFS.push({cx:bx+bw/2,cy:by+bh/2,w:bw,h:bh});
        }
      }
    }
  }
  /* ---- pick rooftops that host enemy units: helipads (heli) & gun emplacements ---- */
  const PADS=[],GUNS=[];
  ROOFS.sort((a,b)=>b.w*b.h-a.w*a.h);               // biggest roofs first → helipads
  for(const r of ROOFS){
    if(PADS.length>=3)break;
    if(r.w>=26&&r.h>=15&&!PADS.some(p=>Math.abs(p.ty-r.cy)<150)){
      PADS.push({tx:r.cx,ty:r.cy});helipad(fg,r.cx,r.cy,6);}
  }
  for(const r of ROOFS){
    if(GUNS.length>=6)break;
    if(PADS.some(p=>p.tx===r.cx&&p.ty===r.cy))continue;
    if(r.w>=16&&!GUNS.some(g=>Math.abs(g.ty-r.cy)<64&&Math.abs(g.tx-r.cx)<70))
      GUNS.push({tx:r.cx,ty:r.cy});
  }
  /* ---- Avenue A ---- */

        ctx.fillStyle='#8f2f28';ctx.fillRect(x-1,y-3,3,4);                    // cabin east+south

/* == FINAL STAGE: hyperspace rift — wormhole throat, warp filaments, drifting 4D shards == */
function genWarp(){
  const CX=150,CY=146;
  const sky=skyCv(g=>{
    const gr=g.createRadialGradient(CX,CY,0,CX,CY,320);
    gr.addColorStop(0,'#1a0632');gr.addColorStop(0.4,'#0c0322');gr.addColorStop(1,'#020108');
    g.fillStyle=gr;g.fillRect(0,0,W,H);
    /* wormhole throat: receding warped rings */
    for(let i=13;i>=0;i--){
      const f=i/13,r=14+f*f*300,wob=Math.sin(i*1.7)*6*f;
      g.strokeStyle=i%2?'rgba(150,70,255,'+(0.34-f*0.3)+')':'rgba(70,220,255,'+(0.30-f*0.27)+')';
      g.lineWidth=1.5+f*2;
      g.beginPath();g.ellipse(CX+wob,CY+f*f*26,r,r*(0.62+f*0.3),Math.sin(i)*0.2,0,TAU);g.stroke();}
    const core=g.createRadialGradient(CX,CY,0,CX,CY,42);
    core.addColorStop(0,'rgba(255,255,255,0.9)');core.addColorStop(0.35,'rgba(190,120,255,0.55)');
    core.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=core;g.fillRect(CX-42,CY-42,84,84);
    /* stretched stars — light dragged toward the hole */
    for(let i=0;i<90;i++){const a=rnd(0,TAU),d=rnd(60,240),x=CX+Math.cos(a)*d,y=CY+Math.sin(a)*d*1.15;
      if(x<2||x>W-2||y<2||y>H-2)continue;
      g.strokeStyle='rgba(210,190,255,'+rnd(0.12,0.4)+')';g.lineWidth=1;
      g.beginPath();g.moveTo(x,y);g.lineTo(x+Math.cos(a)*rnd(2,7),y+Math.sin(a)*rnd(2,7));g.stroke();}
  });
  /* scrolling layers */
  const[f1,fg1]=tileCv(512); // slow: faint violet filaments + wireframe shards
  for(let i=0;i<9;i++){const x=rnd(6,W-6),y=rnd(0,512),l=rnd(50,130);
    const gr=fg1.createLinearGradient(x,y,x,y+l);
    gr.addColorStop(0,'rgba(120,60,220,0)');gr.addColorStop(0.5,'rgba(140,80,240,0.20)');
    gr.addColorStop(1,'rgba(120,60,220,0)');fg1.strokeStyle=gr;fg1.lineWidth=rnd(1,2.5);
    fg1.beginPath();fg1.moveTo(x,y);fg1.quadraticCurveTo(x+rnd(-14,14),y+l/2,x,y+l);fg1.stroke();}
  for(let i=0;i<7;i++){const x=rnd(14,W-14),y=rnd(8,500),s=rnd(4,10),a0=rnd(0,TAU);
    fg1.strokeStyle='rgba(120,230,255,'+rnd(0.15,0.4)+')';fg1.lineWidth=1;
    fg1.beginPath();
    for(let k=0;k<=4;k++){const a=a0+k*TAU/4,px=x+Math.cos(a)*s,py=y+Math.sin(a)*s*0.7;
      k?fg1.lineTo(px,py):fg1.moveTo(px,py);}
    fg1.moveTo(x-s,y);fg1.lineTo(x+s,y);fg1.stroke();}
  const[f2,fg2]=tileCv(512); // mid: brighter energy streaks
  for(let i=0;i<26;i++){const x=rnd(4,W-4),y=rnd(0,506);
    fg2.fillStyle=Math.random()<0.5?'rgba(190,120,255,'+rnd(0.3,0.6)+')':'rgba(110,225,255,'+rnd(0.3,0.6)+')';
    fg2.fillRect(x,y,1,rnd(4,14));}
  const[f3,fg3]=tileCv(512); // fast: white warp lines
  for(let i=0;i<16;i++){fg3.fillStyle='rgba(240,240,255,'+rnd(0.5,0.85)+')';
    fg3.fillRect(rnd(4,W-4)|0,rnd(0,490)|0,1,rnd(10,26));}
  /* live fx: rotating swirl arms + pulsing core + drifting mini-polytopes */
  const shards=[0,1,2].map(i=>({x:rnd(30,270),y:rnd(-40,H),s:rnd(7,13),r:rnd(0,TAU),vr:rnd(-1.4,1.4),vy:rnd(26,50)}));
  return{sky,layers:[{cv:f1,spd:0.28},{cv:f2,spd:0.7},{cv:f3,spd:1.8}],shadow:0,
    fx(dt,t){
      ctx.globalCompositeOperation='lighter';
      for(let i=0;i<3;i++){
        ctx.strokeStyle=i%2?'rgba(120,230,255,0.20)':'rgba(190,110,255,0.22)';
        ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(CX,CY,26+i*15,t*(0.9+i*0.35)+i*2.1,t*(0.9+i*0.35)+i*2.1+3.9);ctx.stroke();}
      glow(GLO.violet,CX,CY,60+Math.sin(t*2.2)*10,0.30);
      glow(GLO.white,CX,CY,20+Math.sin(t*3.4)*4,0.35);
      for(const sh of shards){
        sh.y+=sh.vy*dt;sh.r+=sh.vr*dt;
        if(sh.y>H+30){sh.y=-30;sh.x=rnd(30,270);}
        ctx.strokeStyle='rgba(160,240,255,0.5)';ctx.lineWidth=1;
        ctx.save();ctx.translate(sh.x,sh.y);ctx.rotate(sh.r);
        ctx.beginPath();
        ctx.moveTo(0,-sh.s);ctx.lineTo(sh.s*0.8,0);ctx.lineTo(0,sh.s);ctx.lineTo(-sh.s*0.8,0);ctx.closePath();
        ctx.moveTo(0,-sh.s*0.5);ctx.lineTo(sh.s*0.4,0);ctx.lineTo(0,sh.s*0.5);ctx.lineTo(-sh.s*0.4,0);ctx.closePath();
        ctx.moveTo(0,-sh.s);ctx.lineTo(0,-sh.s*0.5);ctx.moveTo(0,sh.s);ctx.lineTo(0,sh.s*0.5);
        ctx.moveTo(sh.s*0.8,0);ctx.lineTo(sh.s*0.4,0);ctx.moveTo(-sh.s*0.8,0);ctx.lineTo(-sh.s*0.4,0);
        ctx.stroke();ctx.restore();
        glow(GLO.cyan,sh.x,sh.y,7,0.4);}
      ctx.globalCompositeOperation='source-over';
    },
    over(dt,t){}};
}

const AU={ctx:null,master:null,noise:null,muted:false,lastShoot:0,
  init(){if(this.ctx)return;try{

  /* mobile unlock: must run inside a user gesture. The one-sample buffer kick

     the audio session to 'playback' so the iPhone MUTE SWITCH no longer
     silences the game. All steps are idempotent and wrapped in try/catch. */
  unlock(){this.init();this.resume();
    if(this.ctx&&!this._uk){try{
      const s=this.ctx.createBufferSource();
      s.buffer=this.ctx.createBuffer(1,1,22050);
      s.connect(this.ctx.destination);s.start(0);this._uk=true;}catch(e){}}

      a.src='data:audio/wav;base64,UklGRrQBAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YZABAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA';

  beep(f0,f1,dur,type,vol,delay){if(!this.ctx||this.muted)return;

/* ---------- title-screen passwords (dev cheats) ----------
   typed on the title screen: j1-j6 = start at stage N · b1-b6 = straight to boss of stage N
   bomb = unlimited bombs · weapon1 / weapon2 = vulcan / laser always at max level */
const CHEAT={stage:1,boss:false,bomb:false,w1:false,w2:false,god:false};
const dCheat=D('cheatBadge');
let cheatBuf='';
function cheatBadge(){
  const p=[];
  if(CHEAT.boss)p.push('BOSS '+CHEAT.stage);
  else if(CHEAT.stage>1)p.push('STAGE '+CHEAT.stage);
  if(CHEAT.god)p.push('∞ LIVES');
  if(CHEAT.bomb)p.push('∞ BOMB');
  if(CHEAT.w1)p.push('WEAPON1 MAX');
  if(CHEAT.w2)p.push('WEAPON2 MAX');
  dCheat.textContent='✓ '+p.join(' · ');
  dCheat.style.display='block';
}
function pwMatch(buf){
  let ok=false,m;
  if((m=buf.match(/([jb])([1-6])$/))){CHEAT.stage=+m[2];CHEAT.boss=m[1]==='b';ok=true;}
  else if(/god$/.test(buf)){CHEAT.god=true;ok=true;}
  else if(/bomb$/.test(buf)){CHEAT.bomb=true;ok=true;}
  else if(/weapon1$/.test(buf)){CHEAT.w1=true;CHEAT.w2=false;ok=true;}
  else if(/weapon2$/.test(buf)){CHEAT.w2=true;CHEAT.w1=false;ok=true;}
  if(ok){cheatBadge();AU.pow();say('Password',true);}
  return ok;
}
function tryCheat(k){
  if(!/^[a-z0-9]$/.test(k))return;
  cheatBuf=(cheatBuf+k).slice(-10);
  if(pwMatch(cheatBuf))cheatBuf='';
}
/* title-screen password BOX — works even when raw keys can't reach the game
   (artifact iframe focus, Japanese IME full-width input, mobile) */
const dPw=D('pwInput');
for(const ev of['pointerdown','pointerup','click'])
  dPw.addEventListener(ev,e=>e.stopPropagation());       // clicking the box must NOT start the game
dPw.addEventListener('keydown',e=>{
  e.stopPropagation();                                   // typed keys stay out of the game handler
  if(e.key==='Enter'&&!e.isComposing){dPw.blur();if(state==='title')startGame();}
});
dPw.addEventListener('input',()=>{
  const v=dPw.value.normalize('NFKC').toLowerCase().replace(/[^a-z0-9]/g,'');  // ｂ１ → b1
  if(pwMatch(v))dPw.value='';
});

function dust(x,y,col){for(let i=0;i<10;i++){const a=rnd(0,TAU),sp=rnd(15,70);
  parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:rnd(0.3,0.7),t:0,s:rnd(2,4),g:0,ty:'px',col:col});}}
function aimAng(x,y){return Math.atan2(P.y-y,P.x-x);}
function eShot(x,y,ang,spd,kind){
  if(eBul.length>360)return;
  eBul.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    r:kind==='hrkt'?8:kind==='brkt'||kind==='mine'?5:kind==='fire'||kind==='log'?6:kind==='rkt'||kind==='ebolt'||kind==='rock'?4:kind==='mg'?2.5:3,k:kind||'orb',rot:ang,
    hp:kind==='hrkt'?22:kind==='brkt'?9:kind==='rkt'?7:0});  /* rockets can be shot down */
}
function aimedSpread(x,y,n,spread,spd,kind){
  const base=aimAng(x,y);
  for(let i=0;i<n;i++){const a=base+(n>1?(i/(n-1)-0.5)*spread:0);eShot(x,y,a,spd,kind);}
}
function ringShot(x,y,n,spd,ph){for(let i=0;i<n;i++)eShot(x,y,ph+i*TAU/n,spd);}
function dropItem(x,y,type){if(items.length>50)items.shift();items.push({x,y,t:0,type,vx:rnd(-6,6)});}

/* ---------- enemies ---------- */
const ROLE={ftr:{hp:2,r:7,sc:150},str:{hp:1,r:6,sc:100},
  eli:{hp:45,r:12,sc:2500},carrier:{hp:14,r:10,sc:1000},
  kam:{hp:1,r:5,sc:150},                              // stage1: kamikaze darter — 1 shot
  twr:{hp:20,r:8,sc:500,ground:true},                 // ALL stages: fixed cannon tower — armored
  heli:{hp:35,r:8,sc:800,ground:true},                // stage1: rooftop helicopter — armored
  bird:{hp:1,r:5,sc:150},                             // stage2: suicide machine-bird — 1 shot
  torn:{hp:95,r:15,sc:800}};                          // stage3: dust devil — shoves and hurts
/* ground-tile scroll offset — per-stage speed/height (city 0.22/768, forest 0.3/768) */
function gOff(){const th=BG.gth||768,sp=BG.gspd!==undefined?BG.gspd:0.22;
  return((scrollY*sp)%th+th)%th;}
function mkE(role,x,y,ex){
  const b=ROLE[role];
  const e=Object.assign({role,x,y,px:x,py:y,hp:b.hp+Math.floor(rank),r:b.r,sc:b.sc,
    ground:!!b.ground,t:0,fc:rnd(0.8,1.8),flash:0,rot:Math.PI,aim:aimAng(x,y),st:0,dead:false,
    spr:role==='carrier'?S.carrier:S.en[stg().key][role]},ex||{});
  enemies.push(e);return e;
}
function updEnemy(e,dt){
  e.t+=dt;e.flash=Math.max(0,e.flash-dt*6);
  if(e.intro>0){e.intro-=dt;
    if(Math.random()<0.5)dust(e.x+rnd(-8,8),e.y+rnd(-4,8),
      stg().key==='sea'?'#cfe8f2':stg().key==='wrp'?'#c07ae8':stg().key==='jgl'?'#4c8a34':'#c89858');
    if(e.intro<=0)e.intro=0;return;}
  const px=e.x,py=e.y;
  switch(e.pat){
    case 'sine':e.y+=e.spd*dt;e.x=e.x0+Math.sin(e.t*e.f+e.ph)*e.amp;break;
    case 'bez':{e.bt+=dt/e.dur;const t=clamp(e.bt,0,1),u=1-t;
      e.x=u*u*e.p0x+2*u*t*e.p1x+t*t*e.p2x;e.y=u*u*e.p0y+2*u*t*e.p1y+t*t*e.p2y;
      if(e.bt>=1)e.dead=true;break;}
    case 'dive':
      if(e.st===0){e.y+=80*dt;if(e.y>e.trig){e.st=1;const a=aimAng(e.x,e.y);
        e.vx=Math.cos(a)*e.spd;e.vy=Math.sin(a)*e.spd;}}
      else{e.x+=e.vx*dt;e.y+=e.vy*dt;}break;
    case 'loop':
      if(e.st===0){e.y+=e.spd*dt;if(e.y>=e.yc){e.st=1;e.ang=0;e.cx=e.x-e.r0;e.cyy=e.y;}}
      else if(e.st===1){e.ang+=e.w*dt;e.x=e.cx+Math.cos(e.ang)*e.r0;e.y=e.cyy+Math.sin(e.ang)*e.r0;
        if(e.ang>=TAU)e.st=2;}
      else e.y+=e.spd*1.3*dt;break;
    case 'hover':
      if(e.st===0){e.y+=95*dt;if(e.y>=e.ty)e.st=1;}
      else if(e.st===1){e.x=e.x0+Math.sin(e.t*1.3)*e.amp;
        if(e.role!=='eli'){e.hd-=dt;if(e.hd<=0)e.st=2;}}   // elites (P carriers) never leave
      else e.y-=80*dt;break;
    case 'zig':e.y+=e.spd*dt;e.zt-=dt;if(e.zt<=0){e.vx=-e.vx;e.zt=e.zp;}e.x+=e.vx*dt;break;
    case 'orbit':e.cy+=e.spd*dt;e.ang+=e.w*dt;
      e.x=e.cx+Math.cos(e.ang)*e.r0;e.y=e.cy+Math.sin(e.ang)*e.r0;break;
    case 'cross':e.x+=e.vx*dt;e.y+=Math.sin(e.t*2)*e.amp*dt;
      if(e.role==='carrier'){                              // carriers patrol, never exit
        if((e.x<14&&e.vx<0)||(e.x>W-14&&e.vx>0))e.vx=-e.vx;
        e.y=clamp(e.y,40,150);}
      break;
    case 'kami':{ /* kamikaze darter: track hard while above, then commit to the dive */
      e.spd=Math.min(e.spd+280*dt,340);
      const ta=aimAng(e.x,e.y);let d=ta-e.aim;while(d>Math.PI)d-=TAU;while(d<-Math.PI)d+=TAU;
      const trn=e.y<P.y-50?2.8+rank*0.5:0.7;
      e.aim+=clamp(d,-trn*dt,trn*dt);
      e.x+=Math.cos(e.aim)*e.spd*dt;e.y+=Math.sin(e.aim)*e.spd*dt;break;}
    case 'torn':{ /* dust devil: sweeps across the dunes, shoving the hero HARD */
      e.x+=e.dir*((e.wspd||56)+Math.sin(e.t*1.3)*16)*dt;
      e.baseY+=11*dt;e.y=e.baseY+Math.sin(e.t*2.1)*28;
      if(P.alive){const dd=Math.hypot(e.x-P.x,e.y-P.y);
        if(dd<130)P.x=clamp(P.x+e.dir*(130-dd)*1.25*dt,PF.xmin,PF.xmax);}
      break;}
    case 'twr':{ /* fixed cannon tower: bolted to its terrain spot (tile coords) */
      const off=gOff(),th=BG.gth||768;
      e.y=(e.ty+off)%th;e.x=e.tx;
      e.fade=e.fade===undefined?1:Math.min(1,e.fade+dt*1.7);
      if(e.st===0&&e.y>28&&e.y<H)e.st=1;            // powers up once it scrolls on screen
      const ta=aimAng(e.x,e.y);let d=ta-e.aim;while(d>Math.PI)d-=TAU;while(d<-Math.PI)d+=TAU;
      e.aim+=clamp(d,-1.9*dt,1.9*dt);
      e.rec=Math.max(0,(e.rec||0)-dt*3);            // barrel recoil eases back
      e.mf=Math.max(0,(e.mf||0)-dt);break;}
    case 'heli':{ /* parked helicopter: (door slides open) → rotor spin-up → lift off & fight */
      e.rang=(e.rang||0)+dt*(2+(e.rpm||0)*36);
      e.mf=Math.max(0,(e.mf||0)-dt);
      e.fade=e.fade===undefined?1:Math.min(1,e.fade+dt*1.7);
      if(e.st<2){
        const off=gOff(),th=BG.gth||768;
        e.y=(e.ty+off)%th;e.x=e.tx;
        if(e.st===0&&e.y>52&&e.y<H-40){
          if(e.door){e.open=Math.min(1,(e.open||0)+dt*1.2);if(e.open>=1)e.st=1;}
          else e.st=1;}
        if(e.st===1){e.rpm=Math.min(e.rpm+dt*0.9,1);
          if(e.rpm>=1){e.st=2;e.ground=false;e.alt=0;e.hov=11;
            e.sideDir=P.x<e.x?1:-1;dust(e.x,e.y,'#c9cdd4');}}
      }else{
        e.rpm=1;e.alt=Math.min(1,e.alt+dt*0.9);
        if(e.hov>0){e.hov-=dt;
          const tx2=clamp(P.x+e.sideDir*46,26,W-26);
          e.x+=(tx2-e.x)*Math.min(dt*1.0,1);
          e.y+=((108+Math.sin(e.t*1.1)*18)-e.y)*Math.min(dt*0.9,1);
        }else{e.y-=100*dt;e.x+=e.sideDir*28*dt;}       // done — climb away
      }break;}
  }
  /* facing from motion (sprites drawn nose-up) */
  {const dx=e.x-px,dy=e.y-py;
    if(dx*dx+dy*dy>0.02)e.rot=Math.atan2(dy,dx)+Math.PI/2;}
  if(e.role!=='carrier'&&(e.y>H+26||e.y<-90||e.x<-40||e.x>W+40))e.dead=true;
  /* firing */
  if(!P.alive||e.y<6||e.y>H-46)return;
  e.fc-=dt;
  if(e.fc>0)return;
  switch(e.role){
    case 'ftr':e.fc=rnd(1.9,2.8)-rank*0.22;eShot(e.x,e.y,aimAng(e.x,e.y),80+rank*18);break;
    case 'eli':e.fc=2.5-rank*0.3;
      if(Math.random()<0.6){aimedSpread(e.x,e.y,5,0.8,92+rank*16);aimedSpread(e.x,e.y,5,0.8,74+rank*13);}
      else ringShot(e.x,e.y,14,70+rank*12,e.t);break;
    case 'twr':                                        // aimed cannon shell once powered up
      if(e.st!==1){e.fc=0.4;break;}
      e.fc=rnd(2.0,2.8)/(1+rank*0.15);
      eShot(e.x+Math.cos(e.aim)*14,e.y-2.6+Math.sin(e.aim)*14,e.aim,56+rank*7,'rkt');
      e.mf=0.15;e.rec=1;break;
    case 'heli':                                       // spread opener, then a rapid aimed burst
      if(e.st<2||e.hov<=0){e.fc=0.5;break;}
      if(e.burst>0){e.burst--;e.fc=0.13;e.mf=0.12;
        eShot(e.x,e.y+9,aimAng(e.x,e.y+9)+rnd(-0.08,0.08),82+rank*10);break;}
      e.fc=rnd(2.0,2.8);e.burst=2+(rank>1?1:0);e.mf=0.16;
      aimedSpread(e.x,e.y+9,2,0.22,76+rank*8);break;
  }
}
const CARRIER_SEQ=['P','P','M','B','P','H','P','B'];
function killEnemy(e){
  e.dead=true;
  addScore(e.sc);
  addExpl(e.x,e.y,e.role==='eli'?1.7:1,e.role==='eli');
  if(e.role==='carrier')dropItem(e.x,e.y,CARRIER_SEQ[carrierDrop++%CARRIER_SEQ.length]);
  else if(e.role==='eli')dropItem(e.x,e.y,'P');
  else if(e.ground&&Math.random()<0.45)dropItem(e.x,e.y,'MED');
}

      mkE('kam',s<0?-16:W+16,rnd(60,170)+i*30,
        {hp:1,pat:'kami',spd:120,aim:s<0?0:Math.PI,spr:S.kam});},
  birds(){ /* stage2: suicide machine-birds — dive packs, some sweep in from the flanks */
    const n0=4+Math.floor(rank),n=stage<=6?Math.ceil(n0/2):n0;
    for(let i=0;i<n;i++)
      mkE('bird',rnd(30,270),-14-i*26,{hp:1,pat:'kami',spd:150,aim:Math.PI/2,spr:S.bird});
    if(Math.random()<(stage<=6?0.25:0.5))for(const s of[-1,1])
      mkE('bird',s<0?-16:W+16,rnd(70,160),{hp:1,pat:'kami',spd:140,aim:s<0?0:Math.PI,spr:S.bird});},
  towers(){ /* fixed cannon towers scroll in at the top edge, bolted to the terrain */
    if(!BG.gth)return;                              // only stages with a real ground tile
    const th=BG.gth,off=((scrollY*BG.gspd)%th+th)%th;
    const ty=((0-off)%th+th)%th;   // enters exactly at the top edge (glued y wraps 0..th)
    const xs=Math.random()<0.5?[rnd(30,110),rnd(190,270)]:[rnd(60,240)];
    for(const x of xs)mkE('twr',x,0,{pat:'twr',tx:x,ty,st:0,aim:Math.PI/2,spr:null,fc:rnd(1.4,2.2)});}
};
const STAGE_WV={
  /* stage 1 roster: ONLY kamikaze darters — cannon towers & helis spawn from their buildings */
  city:[WVB.kamis,WVB.kamis,WVB.kamiV,WVB.kamiPincer],
  /* stage 2 roster: machine-birds + cannon towers — door towers/helis spawn from the terrain */
  jgl:[WVB.birds,WVB.birds,WVB.towers],
  des:[WVB.divers,WVB.swoop,WVB.towers,WVB.zig,WVB.vline,WVB.orbiters],
  sea:[WVB.swoop,WVB.orbiters,WVB.divers,WVB.vline,WVB.loopers,WVB.crossRush],
  spc:[WVB.orbiters,WVB.crossRush,WVB.loopers,WVB.divers,WVB.vline,WVB.swoop],
  wrp:[WVB.orbiters,WVB.crossRush,WVB.divers,WVB.loopers,WVB.zig,WVB.swoop]
};
function spawnWave(){
  const list=STAGE_WV[stg().key]||STAGE_WV.spc;   // fallback: never crash on a missing key
  list[(rnd(0,list.length))|0]();
  if(rank>1.4&&Math.random()<0.4)list[(rnd(0,list.length))|0]();
}
function spawnCarrier(){const s=Math.random()<0.5?1:-1;
  mkE('carrier',s<0?W+16:-16,rnd(70,130),{pat:'cross',vx:s<0?-52:52,amp:9});}
function spawnElite(){mkE('eli',rnd(70,230),-24,{pat:'hover',x0:rnd(70,230),ty:rnd(70,110),amp:66,hd:8});}

/* ---------- player ---------- */
function tryBomb(){
  if(!P.alive||P.bombs<=0||bomb)return;
  if(!CHEAT.bomb)P.bombs--;   // "bomb" password: unlimited
  bomb={t:0};AU.bomb();say('Bomb',true);flashScreen(0.6,500);shake=16;refreshStatus();
}
function firePlayer(dt){
  if(CHEAT.w1&&(P.weapon!=='V'||P.power<7)){P.weapon='V';P.power=7;refreshHUD();}  // weapon1 password
  if(CHEAT.w2&&(P.weapon!=='L'||P.power<7)){P.weapon='L';P.power=7;refreshHUD();}  // weapon2 password
  P.fireCd-=dt;P.mslCd-=dt;
  const firing=true; /* auto-fire on all platforms (dev request) */
  if(firing&&P.fireCd<=0){
    if(P.weapon==='V'){
      P.fireCd=0.095;
      const n=P.power===0?1:Math.min(P.power+1,8),spread=P.power*0.075;
      for(let i=0;i<n;i++){
        const a=-Math.PI/2+(n>1?(i/(n-1)-0.5)*spread*2:0);
        pBul.push({x:P.x+(n>1?(i/(n-1)-0.5)*9:0),y:P.y-13,
          vx:Math.cos(a)*430,vy:Math.sin(a)*430,dmg:1,type:'V',r:4});
      }
      AU.shoot();
    }else{
      P.fireCd=0.062;
      pBul.push({x:P.x,y:P.y-15,vx:0,vy:-520,dmg:1.7+P.power*0.38,type:'L',
        r:5+P.power*0.4,w:4+P.power*1.1,hits:new Set()});
      AU.laser();
    }
  }
  if(firing&&P.sub&&P.mslCd<=0){
    if(P.sub==='M'){
      P.mslCd=0.62-P.subLv*0.1;
      missiles.push({x:P.x-8,y:P.y,vx:0,vy:-130,dmg:5,homing:false,t:0});
      missiles.push({x:P.x+8,y:P.y,vx:0,vy:-130,dmg:5,homing:false,t:0});
    }else{
      P.mslCd=0.75-P.subLv*0.09;
      const n=1+P.subLv;
      for(let i=0;i<n;i++){const s=i%2?1:-1;
        missiles.push({x:P.x+s*8,y:P.y+3,vx:s*100,vy:-30,dmg:2.5,homing:true,t:0,tgt:null});}
    }
  }
}
function playerHit(){
  if(P.inv>0||!P.alive)return;
  P.alive=false;P.respT=1.3;
  addExpl(P.x,P.y,2.2,true);AU.death();flashScreen(0.4,400);shake=18;
  if(!CHEAT.god)P.lives--;   // "god" password: never lose a life
  P.power=Math.max(0,P.power-2);
  refreshStatus();
}
function respawn(){
  P.alive=true;P.x=150;P.y=370;P.inv=3;
  eBul.length=0;
  refreshStatus();
}
</script>
<script>
'use strict';
/* ---------- bosses ---------- */
function bossHp(base){const loop=Math.floor((stage-1)/6)+1;return Math.round(base*(1+(loop-1)*0.6));}
function phaseOf(b){const f=b.hp/b.maxhp;return f>0.62?1:f>0.3?2:3;}
function bossBase(hp){return{hp,maxhp:hp,t:0,flash:0,dying:0,
  hit(dmg){this.hp-=dmg;this.flash=0.2;if(this.hp<=0&&!this.dying){this.hp=0;this.dying=2;eBul.length=0;}}};}
function limb(sx,sy,fx,fy,l1,l2,bend,c1,c2){
  const dx=fx-sx,dy=fy-sy;let d=Math.hypot(dx,dy);d=Math.min(d,l1+l2-1);
  const a=Math.atan2(dy,dx),cosk=clamp((l1*l1+d*d-l2*l2)/(2*l1*d),-1,1);
  const k=Math.acos(cosk)*bend;
  const jx=sx+Math.cos(a+k)*l1,jy=sy+Math.sin(a+k)*l1;
  ctx.strokeStyle=c1;ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(jx,jy);ctx.lineTo(fx,fy);ctx.stroke();
  ctx.strokeStyle=c2;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(jx,jy);ctx.lineTo(fx,fy);ctx.stroke();
  return[jx,jy];
}
/* -- STAGE1: VULTURE Mk.II, colossal attack helicopter (~2/3 of the screen).
   The airframe BANKS and PITCHES with its motion (subtle pose changes as it
   slides left/right or surges forward/back). Big destructible rocket launchers:
   their rockets make ONE mid-flight course correction toward the hero; when a
   launcher is destroyed the arm TRANSFORMS into twin machine guns firing fast
   tracers. New attack: a screaming dive straight down the screen — it vanishes
   off the bottom, then re-enters from the top over the hero and attacks again.
   Classic-3D: dark east flanks, sunlit west edges, big SE ground shadow. -- */
function mkVulture(){
  const b=bossBase(bossHp(860));b.name='VULTURE';
  b.x=150;b.y=-150;b.rang=0;b.atk={m:'enter',t:0,i:0,ang:0};b.beam=null;
  b.px=b.x;b.py=b.y;b.bank=0;b.pitch=0;b.off=false;b.dv=0;
  /* wing rocket launchers — destroy them and the arms refit as machine guns */
  b.pods=[{s:-1,hp:130+rank*25,alive:true,mgf:0,gA:Math.PI/2},
          {s:1,hp:130+rank*25,alive:true,mgf:0,gA:Math.PI/2}];
  const coreHit=b.hit.bind(b);
  b.hit=function(dmg,part){
    if(part===9||part===10){                       // transformed gun arms: their own HP pool
      const p=b.pods[part-9];
      if(!p||p.gdead){b.flash=Math.max(b.flash,0.03);return;}   // blown-off stump: nothing left
      if(p.ghp===undefined)p.ghp=110+rank*20;
      p.ghp-=dmg;b.flash=Math.max(b.flash,0.08);
      if(Math.random()<0.5)parts.push({x:b.x+(part===9?-68:68)+rnd(-8,8),y:b.y+18+rnd(-6,6),
        vx:rnd(-30,30),vy:rnd(-60,-10),life:0.22,t:0,s:2,g:130,ty:'px',col:'#ffe9a8'});
      if(p.ghp<=0){p.gdead=true;
        addExpl(b.x+p.s*68,b.y+21,1.5,true);addScore(3000);popup(b.x+p.s*68,b.y+21,'+3000');
        banner(p.s<0?'左アーム完全破壊！':'右アーム完全破壊！',1.6);shake=Math.max(shake,7);}
      return;}
    if(part>=0&&part<2&&b.pods[part]&&b.pods[part].alive){
      const p=b.pods[part];p.hp-=dmg;b.flash=0.15;
      if(p.hp<=0){p.alive=false;
        addExpl(b.x+p.s*68,b.y+21,1.5,true);addScore(2000);
        banner(p.s<0?'左ポッド破壊 — アーム機関砲に変形！':'右ポッド破壊 — アーム機関砲に変形！',1.6);}
      return;}
    coreHit(dmg);
  };
  b.update=function(dt){
    b.t+=dt;b.flash=Math.max(0,b.flash-6*dt);b.rang+=dt*30;
    /* pose from motion: bank into sideways travel, pitch with fore/aft surge */
    const vx=(b.x-b.px)/Math.max(dt,1e-4),vy=(b.y-b.py)/Math.max(dt,1e-4);
    b.px=b.x;b.py=b.y;
    b.bank+=(clamp(vx*0.006,-0.26,0.26)-b.bank)*Math.min(dt*3.5,1);
    b.pitch+=(clamp(vy*0.005,-0.2,0.2)-b.pitch)*Math.min(dt*3.5,1);
    for(const p of b.pods){p.mgf=Math.max(0,p.mgf-dt);
      if(!p.alive&&!p.gdead){ /* refitted guns track the hero (within the mount's arc) */
        const ta=aimAng(b.x+p.s*68,b.y+28);
        let dd=ta-p.gA;while(dd>Math.PI)dd-=TAU;while(dd<-Math.PI)dd+=TAU;
        p.gA+=clamp(dd,-3*dt,3*dt);
        p.gA=Math.PI/2+clamp(p.gA-Math.PI/2,-0.55,0.55);}}
    if(b.dying>0)return;
    if(b.atk.m==='enter'){b.y+=52*dt;if(b.y>=92)b.atk={m:'idle',t:1.2,i:0,ang:0};return;}
    const ph=phaseOf(b),spd=1+(ph-1)*0.3+rank*0.08;
    const A=b.atk;A.t-=dt;
    if(A.m==='dive'){ /* nose over → scream down the screen → re-enter from the top */
      if(A.i===0){b.pitch=Math.max(b.pitch-dt*1.5,-0.26);   // rears back, rotors screaming, before the plunge
        b.y=Math.max(72,b.y-44*dt);
        shake=Math.max(shake,3.6+Math.sin(b.t*58)*2.4);
        if(A.t<=0){A.i=1;b.dv=140;b.pitch=0.2;AU.warn();}}
      else if(A.i===1){b.dv+=560*dt;b.y+=b.dv*dt;
        b.x+=clamp(P.x-b.x,-95*dt,95*dt);           // hunts the hero's column
        if(Math.random()<0.7)parts.push({x:b.x+rnd(-40,40),y:b.y-rnd(60,110),vx:0,vy:-160,
          life:0.22,t:0,s:rnd(3,6),g:0,ty:'glow',img:GLO.white,a:0.25});
        if(b.y>H+170){A.i=2;A.t=rnd(1.1,1.7);b.off=true;b.dv=0;}}
      else if(A.i===2){if(A.t<=0){b.off=false;b.x=clamp(P.x,64,236);b.y=-150;A.i=3;AU.warn();}}
      else{b.y+=180*dt;
        if(b.y>=92){b.y=92;A.m='idle';A.t=0.6;}}
      return;}
    /* glide toward the sway target — never snap onto it */
    const tx=150+Math.sin(b.t*0.45)*54,ty=92+Math.sin(b.t*0.9)*7;
    b.x+=(tx-b.x)*Math.min(dt*2.5,1);
    b.y+=(ty-b.y)*Math.min(dt*2.5,1);
    /* chin laser: 0.7s telegraph line, then a rapid needle stream (sweeps in phase 3) */
    if(b.beam){b.beam.tt-=dt;
      if(b.beam.tele){if(b.beam.tt<=0){b.beam.tele=false;b.beam.tt=0;b.beam.fired=0;AU.warn();}}
      else{if(b.beam.tt<=0&&b.beam.fired<b.beam.n){
          eShot(b.x,b.y+72,b.beam.ang,320,'needle');b.beam.fired++;b.beam.tt=0.04;
          b.beam.ang+=b.beam.sw;}
        if(b.beam.fired>=b.beam.n)b.beam=null;}}
    if(A.m==='idle'){if(A.t<=0){
      const hasPods=b.pods.some(p=>p.alive),hasGuns=b.pods.some(p=>!p.alive);
      const pool=['laser'];
      if(hasPods)pool.push('rockets');
      if(hasGuns)pool.push('mguns','mguns');
      pool.push('dive');
      if(ph>=2)pool.push('drones');
      if(ph===3)pool.push('sweep');
      A.m=pool[(rnd(0,pool.length))|0];A.t=A.m==='dive'?0.75:0;A.i=0;A.ang=rnd(0,TAU);
      if(A.m==='dive')b.beam=null;}return;}
    if(A.m==='rockets'&&A.t<=0){ /* big rockets — each corrects course toward the hero ONCE */
      const alive=b.pods.filter(p=>p.alive);
      if(!alive.length){A.m='idle';A.t=0.6;}
      else{const s=alive[A.i%alive.length].s,px=b.x+s*68,py=b.y+24;
        eShot(px,py,aimAng(px,py)+rnd(-0.3,0.3),(56+rank*8)*spd,'brkt');
        const rb=eBul[eBul.length-1];
        /* rockets home continuously now (see enemy-bullet loop) */
        parts.push({x:px,y:py,vx:0,vy:20,life:0.2,t:0,s:14,g:40,ty:'glow',img:GLO.orange,a:0.6});
        A.i++;A.t=0.3;if(A.i>=4+ph*2){A.m='idle';A.t=1.7/spd;}}}
    else if(A.m==='mguns'&&A.t<=0){ /* transformed arms: fast tracer bursts */
      const dead=b.pods.filter(p=>!p.alive&&!p.gdead);
      if(!dead.length){A.m='idle';A.t=0.6;}
      else{const p=dead[A.i%dead.length],px=b.x+p.s*68,py=b.y+30;
        eShot(px,py,p.gA+rnd(-0.06,0.06),(205+rank*18)*spd,'mg');
        p.mgf=0.09;
        A.i++;A.t=0.075;if(A.i>=12+ph*4){A.m='idle';A.t=1.5/spd;}}}
    else if(A.m==='laser'){
      b.beam={ang:aimAng(b.x,b.y+72),tt:0.7,tele:true,n:16+ph*4,sw:0};
      A.m='idle';A.t=2.3/spd;}
    else if(A.m==='sweep'){ /* phase 3: beam rakes across the screen */
      const dir=P.x<b.x?-1:1;
      b.beam={ang:Math.PI/2-dir*0.7,tt:0.7,tele:true,n:26,sw:dir*0.055};
      A.m='idle';A.t=2.6/spd;}
    else if(A.m==='drones'&&A.t<=0){ /* small kamikaze drones from the hatches */
      const s=A.i%2?1:-1;
      mkE('kam',b.x+s*52,b.y+36,{hp:1,pat:'kami',spd:90,aim:Math.PI/2,spr:S.kam,intro:0.45});
      A.i++;A.t=0.5;if(A.i>=2+ph){A.m='idle';A.t=1.9/spd;}}
  };
  b.circles=()=>b.off?[]:[
    {x:b.x-68,y:b.y+21,r:16,part:b.pods[0].alive?0:9},
    {x:b.x+68,y:b.y+21,r:16,part:b.pods[1].alive?1:10},
    {x:b.x,y:b.y,r:42,part:-1},
    {x:b.x,y:b.y-80,r:16,part:-1},
    {x:b.x-44,y:b.y+15,r:13,part:-1},{x:b.x+44,y:b.y+15,r:13,part:-1},
    {x:b.x,y:b.y+56,r:18,part:-1}];
  b.draw=function(){
    if(b.off)return;
    const x=b.x,y=b.y,t=b.t;
    /* big ground shadow, offset SE — rotor blades sweep across it */
    ctx.fillStyle='rgba(25,35,60,0.28)';
    ctx.beginPath();ctx.ellipse(x+40,y+56,92,36,0,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(25,35,60,0.20)';ctx.lineWidth=4;
    for(const o of[0,Math.PI/2]){ctx.beginPath();
      ctx.moveTo(x+40-Math.cos(b.rang+o)*84,y+44-Math.sin(b.rang+o)*30);
      ctx.lineTo(x+40+Math.cos(b.rang+o)*84,y+44+Math.sin(b.rang+o)*30);ctx.stroke();}
    /* pose: bank into lateral motion, pitch with surge — small, smooth changes */
    ctx.save();ctx.translate(x,y);
    ctx.rotate(b.bank*0.55+Math.sin(t*0.9)*0.015);
    ctx.scale(1-Math.abs(b.bank)*0.10,1+b.pitch*0.12);
    /* under-hull depth layer — the airframe's own east+south faces */
    ctx.fillStyle='#171b23';
    ctx.fillRect(-6,-108,20,72);       // tail
    ctx.fillRect(-74,16,160,14);       // wings
    ctx.fillRect(-18,-48,48,120);      // fuselage
    /* tail boom — east side dark, west lit, red squadron band */
    ctx.fillStyle='#2a303c';ctx.fillRect(-8,-116,20,72);
    ctx.fillStyle='#3d4552';ctx.fillRect(-12,-116,20,72);
    ctx.fillStyle='#525b6a';ctx.fillRect(-12,-116,6,72);
    ctx.fillStyle='rgba(16,20,28,0.7)';
    for(let k=0;k<4;k++)ctx.fillRect(-12,-108+k*16,20,1.5);   // boom panel seams
    ctx.fillStyle='#8e2f24';ctx.fillRect(-12,-104,20,6);
    ctx.fillStyle='#d8543c';ctx.fillRect(-12,-104,20,2);      // sunlit edge of the band
    /* tail fin + spinning tail rotor */
    ctx.fillStyle='#2a303c';ctx.fillRect(8,-114,20,10);
    ctx.fillStyle='#3d4552';ctx.fillRect(8,-112,18,8);
    ctx.fillStyle='#d8543c';ctx.fillRect(22,-112,4,8);
    ctx.strokeStyle='rgba(220,230,245,0.55)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(28-Math.cos(b.rang*3.1)*17,-106-Math.sin(b.rang*3.1)*17);
    ctx.lineTo(28+Math.cos(b.rang*3.1)*17,-106+Math.sin(b.rang*3.1)*17);ctx.stroke();
    /* stub wings with sunlit leading edge + wingtip fences */
    ctx.fillStyle='#2a303c';ctx.fillRect(-80,12,160,14);
    ctx.fillStyle='#3d4552';ctx.fillRect(-80,8,160,14);
    ctx.fillStyle='#525b6a';ctx.fillRect(-80,8,160,4);
    ctx.fillStyle='#1c212b';ctx.fillRect(-80,8,4,18);ctx.fillRect(76,8,4,18);
    ctx.fillStyle='rgba(255,255,255,0.55)';                  // wing insignia
    ctx.fillRect(-46,12,8,2);ctx.fillRect(-43,9,2,8);
    ctx.fillRect(38,12,8,2);ctx.fillRect(41,9,2,8);
    /* pylons under the launcher stations */
    ctx.fillStyle='#20252e';ctx.fillRect(-72,20,8,12);ctx.fillRect(64,20,8,12);
    for(const p of b.pods){const s=p.s;
      if(p.alive){ /* BIG rocket launcher: 6 visible tubes, hazard nose stripe */
        ctx.fillStyle='#181c23';ctx.fillRect(s*68-7,8,18,32);
        const pg=ctx.createLinearGradient(s*68-9,0,s*68+9,0);
        pg.addColorStop(0,'#4f5866');pg.addColorStop(0.5,'#3a424e');pg.addColorStop(1,'#232833');
        ctx.fillStyle=pg;ctx.fillRect(s*68-9,6,18,32);
        ctx.fillStyle='#6a7382';ctx.fillRect(s*68-9,6,3,32);
        for(let k=0;k<4;k++){ctx.fillStyle=k%2?'#d8a020':'#191510';   // hazard stripe
          ctx.fillRect(s*68-9+k*4.5,6,4.5,4);}
        for(let r2=0;r2<3;r2++)for(let c2=0;c2<2;c2++){                // rocket tube mouths
          ctx.fillStyle='#0e1116';ctx.fillRect(s*68-6+c2*8,13+r2*8,6,5);
          ctx.fillStyle='#2c333e';ctx.fillRect(s*68-6+c2*8,13+r2*8,6,1.5);
          ctx.fillStyle='#7c2018';ctx.fillRect(s*68-4.5+c2*8,15+r2*8,3,2);}
        if(p.hp<60){ctx.fillStyle='#12151b';                           // battle-worn cracks
          ctx.fillRect(s*68-4,12,3,10);ctx.fillRect(s*68+2,22,3,8);}
      }else if(p.gdead){ /* arm blown clean off: charred, smoking stump */
        ctx.fillStyle='#12151b';ctx.fillRect(s*68-8,8,17,10);
        ctx.fillStyle='#23272e';ctx.fillRect(s*68-9,7,16,9);
        ctx.fillStyle='#0c0f14';ctx.beginPath();ctx.arc(s*68,14,5,0,TAU);ctx.fill();
        ctx.fillStyle='#3a2a20';ctx.beginPath();ctx.arc(s*68-2,12,2.2,0,TAU);ctx.fill();
        if(Math.random()<0.35)parts.push({x:b.x+s*68+rnd(-5,5),y:b.y+12,vx:rnd(-6,6),
          vy:-26,life:0.5,t:0,s:rnd(5,9),g:24,ty:'glow',img:GLO.orange,a:0.25});

        for(let i=0;i<3;i++)dust(b.x+rnd(-14,14),b.y+rnd(-14,14),'#c89858');AU.warn();}

      b.tgt=b.under?{x:P.x,y:clamp(P.y-90,40,240)}:{x:rnd(40,260),y:rnd(40,235)};
      b.retgt=rnd(1.1,2);}

    let d=ta-b.ang;while(d>Math.PI)d-=TAU;while(d<-Math.PI)d+=TAU;

  };

    if(idx<0)return null;
    const x=b.hist[idx],y=b.hist[idx+1],x2=b.hist[Math.max(idx-4,0)],y2=b.hist[Math.max(idx-4,0)+1];
    return{x,y,rot:Math.atan2(y-y2,x-x2)+Math.PI/2};};

  b.draw=function(){
    if(b.under)return;
    for(let i=b.segN;i>=1;i--){const p=b.segPos(i);if(!p)continue;
      blit(cfg.seg,p.x,p.y,p.rot);
      ctx.fillStyle='rgba(235,255,235,0.30)';ctx.fillRect(p.x-4,p.y-4,2,2);}  // sun glint on each armor plate
    blit(cfg.head,b.x,b.y,b.ang+Math.PI/2);
    ctx.globalCompositeOperation='lighter';
    glow(GLO[cfg.orb],b.x,b.y,20,0.3+0.2*Math.sin(b.t*6));
    ctx.globalCompositeOperation='source-over';
    if(b.flash>0){ctx.globalAlpha=b.flash*2;ctx.globalCompositeOperation='lighter';
      blit(cfg.head,b.x,b.y,b.ang+Math.PI/2);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;}

/* -- STAGE2: TIMBER REAPER, giant forest-harvesting machine — the thing that
   flattened the jungle. Two huge ROTATING SAWS ride hydraulic arms extending
   from its body: sealed together in front nothing can hurt it (then it lunges);
   spread open it vents fire or hurls logs. DESTROY the harvester and it isn't

   cannon shells, coax laser, hull machine gun, and a flat-out dash-ram. Both

  else if(p<0.66){const u=es((p-0.42)/0.24);A=reaperLerpA(backA,fwdA,u);L=(restL-14)+(restL*0.4+26)*u;}

  /* ---- procedural sideways-crab GAIT ----
     A real walk: each foot is planted in WORLD space and stays put while the body
     slides over it (no skating). A foot only lifts when it has stretched past a
     limit from where the body now wants it, then swings ahead in the travel
     direction and re-plants. A cap on simultaneous swings keeps the crab always
     supported, which makes the eight legs sequence themselves into a wave. */
  function stepLegs(dt){
    const dx=b.x-b.px;b.px=b.x;
    const mdir=Math.abs(dx)>0.04?Math.sign(dx):b.face;   // which way it is sidling
    let swinging=0;for(const l of b.legs2)if(l.swing>=0)swinging++;
    const STRIDE=14,MAXSTR=15,LIFT=9,STEPT=0.15;
    for(const l of b.legs2){
      const neutral=b.x+l.spread;                        // where this foot wants to sit under the body
      if(l.swing<0){                                     // PLANTED — foot frozen in world space
        const stretch=neutral-l.wx;
        if(Math.abs(stretch)>MAXSTR+l.jit&&swinging<3){  // over-stretched, and support allows a step
          l.swing=0;l.fromX=l.wx;l.toX=neutral+mdir*STRIDE;swinging++;}
      }else{                                             // SWING — lift, arc forward, re-plant
        l.swing+=dt/STEPT;const s=Math.min(1,l.swing);
        l.wx=l.fromX+(l.toX-l.fromX)*(s*s*(3-2*s));
        l.lift=Math.sin(s*Math.PI)*LIFT;
        if(l.swing>=1){l.swing=-1;l.lift=0;
          if(Math.random()<0.7)dust(l.wx,b.y+l.reachY,'#d8bc80');}}   // sand puff on touchdown
    }
  }

/* -- STAGE5 boss, TWO FORMS.
   FORM 1  OVERMIND: a huge strange alien dreadnought — angular mirrored hull,
     glowing dorsal spine, forward mandible prongs, and a tilted HALO RING that
     rotates THROUGH the hull (front arc passes in front, back arc behind).
     The armoured IRIS EYE opens on a cycle — the core takes damage only then.
   FORM 2  PENTARON: the wreck bursts into FIVE SMALL SHIPS which combine into
     a robot. It punches with rocket fists and fires a chest beam — and it can
     DIVIDE back into the five ships for strafing runs, then recombine. -- */
function mkOvermind(){
  const F1HP=bossHp(520),F2HP=bossHp(640);
  const b=bossBase(F1HP);b.name='OVERMIND';
  b.x=150;b.y=-90;b.form=1;b.atk={m:'enter',t:0,i:0,ang:0};
  b.rot=0;b.iris=0;b.irisT=2.2;b.irisOpen=false;b.hint=false;b.beam=null;b.fade=1;
  /* the five component ships: 0=torso/head 1=L arm 2=R arm 3=L leg 4=R leg */
  const SOCK=[[0,-2],[-29,-2],[29,-2],[-13,28],[13,28]];
  const CS=[['#d8c8ff','#7a5fc0','#241a44'],['#c8f4ff','#3f93b8','#0c2c3c'],
            ['#ffe2c0','#c07f3a','#3c220c'],['#d2f8c8','#5ea852','#16350f'],
            ['#fff2b8','#c0a23a','#3c300c']];
  b.ships=SOCK.map((s,i)=>({i,x:150+s[0],y:96+s[1],vx:0,vy:0,fc:rnd(0.5,1.5),docked:true}));
  const shipWorld=i=>({x:b.x+SOCK[i][0],y:b.y+SOCK[i][1]});
  const lerpTo=(s,tx,ty,k)=>{s.px=s.x;s.py=s.y;s.x+=(tx-s.x)*k;s.y+=(ty-s.y)*k;};
  const cS=(a,c)=>{let d=a-c;while(d>Math.PI)d-=TAU;while(d<-Math.PI)d+=TAU;return d;};
  const cE=k=>k*k*(3-2*k);

  /* ================= UPDATE ================= */
  b.update=function(dt){
    b.t+=dt;b.flash=Math.max(0,b.flash-6*dt);
    if(b.dying>0)return;
    const ph=phaseOf(b),spd=1+(ph-1)*0.3+rank*0.08,A=b.atk;
    A.t-=dt;
    /* ---------- FORM 1: the dreadnought ---------- */
    if(b.form===1){
      b.rot+=dt*1.1;
      if(A.m==='enter'){b.y+=40*dt;if(b.y>=86){b.y=86;b.atk={m:'idle',t:1,i:0,ang:0};}return;}
      /* iris cycle: closed 2.6s / open 2.4s */
      b.irisT-=dt;
      if(b.irisT<=0){b.irisOpen=!b.irisOpen;b.irisT=b.irisOpen?2.4:2.6;
        if(b.irisOpen){AU.servo();if(!b.hint){b.hint=true;banner('虹彩が開く瞬間だけコアを撃て！',2.4);}}}
      b.iris+=((b.irisOpen?1:0)-b.iris)*Math.min(dt*5,1);
      /* glide (sweep overrides x) */
      if(A.m!=='sweep'){
        b.x+=((150+Math.sin(b.t*0.4)*34)-b.x)*Math.min(dt*2,1);
        b.y+=((86+Math.sin(b.t*0.9)*7)-b.y)*Math.min(dt*2,1);}
      /* beam volley */
      if(b.beam){b.beam.t-=dt;
        if(b.beam.tele&&b.beam.t<=0){b.beam.tele=false;b.beam.t=0;}
        if(!b.beam.tele){b.beam.t-=0;
          if(b.beam.ft===undefined)b.beam.ft=0;b.beam.ft-=dt;
          if(b.beam.ft<=0&&b.beam.fired<14){
            eShot(b.x,b.y+6,b.beam.ang,300,'needle');b.beam.fired++;b.beam.ft=0.035;}
          if(b.beam.fired>=14)b.beam=null;}}
      if(A.m==='idle'){if(A.t<=0){
        const pool=ph===1?['spokes','sweep','ring']
          :ph===2?['spokes','sweep','beam','ring']
          :['sweep','beam','spiral','spokes','ring'];
        A.m=pool[(rnd(0,pool.length))|0];A.t=0;A.i=0;A.ang=rnd(0,TAU);
        if(A.m==='sweep'){A.dir=P.x>b.x?1:-1;A.tt=0;AU.warn();}}return;}
      if(A.m==='spokes'&&A.t<=0){ /* halo ring nodes fire rotating spokes */
        for(let k=0;k<6;k++){const a2=b.rot+k*TAU/6;
          const nx=b.x+Math.cos(a2)*46,ny=b.y+8+Math.sin(a2)*15;
          eShot(nx,ny,A.ang+k*TAU/6,(74+rank*10)*spd);}
        A.ang+=0.24;A.i++;A.t=0.3;if(A.i>=6+ph){A.m='idle';A.t=1.4/spd;}}
      else if(A.m==='ring'&&A.t<=0){ringShot(b.x,b.y+4,22,(72+rank*10)*spd,A.ang+A.i*0.13);
        A.i++;A.t=0.5;if(A.i>=3){A.m='idle';A.t=1.5/spd;}}
      else if(A.m==='sweep'){ /* strafe across, raining orbs from the mandibles */
        A.tt+=dt;const tx=150+A.dir*Math.sin(Math.min(1,A.tt/1.9)*Math.PI)*105;
        b.x+=(tx-b.x)*Math.min(dt*3,1);
        if(A.t<=0){A.t=0.13;
          for(const s of[-1,1])eShot(b.x+s*26,b.y+42,Math.PI/2+rnd(-0.12,0.12),(84+rank*10)*spd,'orb');}
        if(A.tt>=1.95){A.m='idle';A.t=1.2/spd;}}
      else if(A.m==='beam'){b.beam={ang:aimAng(b.x,b.y+6),t:0.7,fired:0,tele:true};
        A.m='idle';A.t=2/spd;}
      else if(A.m==='spiral'&&A.t<=0){
        for(let k=0;k<3;k++)eShot(b.x,b.y+4,A.ang+k*TAU/3,86*spd);
        A.ang+=0.31;A.i++;A.t=0.05;if(A.i>=42){A.m='idle';A.t=1.4/spd;}}

    /* ---------- TRANSITION: breakup -> five ships -> combine ---------- */

      if(A.m==='breakup'){ /* the dreadnought tears apart */

        if(Math.random()<dt*16)addExpl(b.x+rnd(-58,58),b.y+rnd(-26,40),rnd(0.6,1.5));
        if(A.tt>=1.5){A.m='regroup';A.tt=0;AU.warn();

          for(const s of b.ships){s.docked=false;
            s.x=b.x+rnd(-50,50);s.y=b.y+rnd(-20,30);}}

        const k=Math.min(1,A.tt/1.2);
        for(const s of b.ships){const a2=-Math.PI/2+s.i*TAU/5;
          lerpTo(s,150+Math.cos(a2)*56,96+Math.sin(a2)*40,Math.min(dt*(2+k*3),1));}
        if(A.tt>=1.5){A.m='combine';A.tt=0;b.x=150;b.y=96;
          banner('五機合体 — 機兵 PENTARON！！',2.6);AU.warn();}
        return;}
      if(A.m==='combine'){ /* ships spiral in and dock one by one */
        let all=true;
        for(const s of b.ships){
          const dly=s.i*0.22,w=shipWorld(s.i);
          if(A.tt<dly){all=false;continue;}
          if(!s.docked){all=false;
            lerpTo(s,w.x,w.y,Math.min(dt*7,1));
            if(Math.hypot(s.x-w.x,s.y-w.y)<2){s.docked=true;AU.clank();shake=Math.max(shake,5);
              for(let q=0;q<8;q++)parts.push({x:w.x+rnd(-6,6),y:w.y+rnd(-6,6),vx:rnd(-50,50),vy:rnd(-50,50),
                life:0.3,t:0,s:rnd(2,3.5),g:0,ty:'glow',img:GLO.cyan,a:0.6});}}}
        if(all&&A.tt>1.4){b.form=2;b.name='PENTARON';

    /* ---------- FORM 2: the combining robot ---------- */

      b.y+=((96+Math.sin(b.t*1.1)*6)-b.y)*Math.min(dt*1.6,1);}

    if(A.m==='idle'){if(A.t<=0){

      if(A.m==='punch'){A.arm=Math.random()<0.5?1:2;A.ph='out';A.tx=P.x;A.ty=P.y;
        const w=shipWorld(A.arm);A.fx=w.x;A.fy=w.y;AU.servo();}

          if(b.beam.fired>=16){b.beam=null;A.m='idle';A.t=1.3/spd;}}}

          addExpl(s.x,s.y,0.9);ringShot(s.x,s.y,8,(66+rank*8)*spd,b.t);}}
      else if(A.ph==='hold'){if(A.tt>=0.12){A.ph='back';A.tt=0;}}

            else if(s.i<3){s.fc=0.95;aimedSpread(s.x,s.y,2,0.3,(118+rank*12)*spd,'mg');}
            else{s.fc=0.85;eShot(s.x,s.y,Math.PI/2+Math.sin(b.t+s.i)*0.5,(88+rank*10)*spd,'orb');}}
          if(P.alive&&P.inv<=0&&Math.hypot(s.x-P.x,s.y-P.y)<11)playerHit();}

      else{ /* fly home and dock */

          if(Math.hypot(s.x-w.x,s.y-w.y)<2.5){s.docked=true;AU.clank();shake=Math.max(shake,3);}}

      return;}
  };
  /* ================= HITBOXES ================= */
  b.circles=function(){

    const c=[{x:b.x,y:b.y,r:13,part:-1},                            /* chest core */

    for(const s of[-1,1]){c.push({x:b.x+s*27,y:b.y+2,r:9,part:9});  /* arms */

  b.hit=function(dmg,part){

    ctx.fillStyle='#0c1420';ctx.beginPath();ctx.ellipse(0,-2,1.9,3,0,0,TAU);ctx.fill();   /* canopy */

  const shipRot=s=>{const dx=s.x-(s.px===undefined?s.x:s.px),dy=s.y-(s.py===undefined?s.y:s.py);
    return dx*dx+dy*dy>0.01?Math.atan2(dy,dx)+Math.PI/2:0;};
  /* ---- form 1 hull ---- */
  const drawShip1=t=>{

    ctx.globalCompositeOperation='source-over';
    for(let k=0;k<6;k++){ /* six iris blades slide outward as it opens */

      ctx.strokeStyle='#4c3f80';ctx.lineWidth=0.8;ctx.beginPath();
      ctx.moveTo(0,0);ctx.arc(0,0,10.5,-Math.PI/6,Math.PI/6);ctx.closePath();ctx.stroke();
      ctx.restore();}
    /* FRONT arc of the halo ring (passes in front of the hull) */

    ctx.beginPath();ctx.ellipse(0,8,46,15,0,0,Math.PI);ctx.stroke();
    ctx.strokeStyle='#8a74d0';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,8,46,15,0,0,Math.PI);ctx.stroke();
    for(let k=0;k<6;k++){const a2=b.rot+k*TAU/6;                     /* ring nodes, front half */
      if(Math.sin(a2)<0)continue;
      const nx=Math.cos(a2)*46,ny=8+Math.sin(a2)*15;
      ctx.fillStyle='#0c0920';ctx.beginPath();ctx.arc(nx,ny,4.2,0,TAU);ctx.fill();
      ctx.fillStyle='#b09ae8';ctx.beginPath();ctx.arc(nx,ny,2.4,0,TAU);ctx.fill();

    ctx.restore();
  };
  /* ---- form 2 robot ---- */
  const ROB={dark:'#0b0816',lo:'#241d40',mid:'#4a4070',hi:'#9a8fc2',edge:'#d8ccf4'};
  const limbBlock=(x,y,w,h,r)=>{ctx.fillStyle=ROB.dark;geoRR(x-1,y-1,w+2,h+2,r+1);ctx.fill();
    const g=ctx.createLinearGradient(0,y,0,y+h);
    g.addColorStop(0,ROB.hi);g.addColorStop(0.5,ROB.mid);g.addColorStop(1,ROB.lo);
